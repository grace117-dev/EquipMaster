    <style>
        :root {
            --bg: #f0f0f5;
            --card: #ffffff;
            --green: #3a5129;
            --green-light: #4e6e36;
            --green-pale: #eaf2e3;
            --accent: #d4a853;
            --text: #111;
            --sub: #888;
            --border: rgba(0,0,0,0.06);
            --shadow: 0 2px 12px rgba(0,0,0,0.07);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
        }
        * { box-sizing: border-box; }
        body {
            font-family: "Noto Sans TC", -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            overscroll-behavior: none;
        }
        /* ── Nav ── */
        .ios-nav {
            background: rgba(255,255,255,0.88);
            backdrop-filter: saturate(200%) blur(24px);
            -webkit-backdrop-filter: saturate(200%) blur(24px);
            border-bottom: 1px solid var(--border);
        }
        /* ── Cards ── */
        .card {
            background: var(--card);
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            position: relative;
            overflow: hidden;
        }
        .card:active { transform: scale(0.985); }

    /* ── Tab Bar ── */
    .tab-bar {
        background: rgba(255,255,255,0.92);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-top: 1px solid var(--border);
    }
    .tab-btn { transition: color 0.2s; }
    .tab-btn.active { color: var(--green); }
    .tab-btn:not(.active) { color: #aaa; }
    .tab-indicator {
        position: absolute;
        bottom: 6px;
        width: 4px; height: 4px;
        background: var(--green);
        border-radius: 50%;
        left: 50%;
        transform: translateX(-50%);
        transition: opacity 0.2s;
    }

    /* ── Pages ── */
    .page { display: none; animation: fadeUp 0.3s ease both; }
    .page.active { display: block; }
    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Stats ── */
    .stat-num {
        font-family: "DM Mono", monospace;
        font-weight: 500;
        letter-spacing: -0.04em;
    }
    .bar-wrap { background: #f0f0f0; border-radius: 99px; overflow: hidden; height: 8px; }
    .bar-fill {
        height: 100%; border-radius: 99px;
        background: linear-gradient(90deg, var(--green), var(--green-light));
        transition: width 0.8s cubic-bezier(.22,.68,0,1.2);
        width: 0;
    }

    /* ── Donut Chart ── */
    .donut-svg { transform: rotate(-90deg); }
    .donut-seg { transition: stroke-dasharray 0.9s cubic-bezier(.22,.68,0,1.2); }

    /* ── Record cards ── */
    .collapse-content { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease, opacity 0.2s ease; opacity: 0; }
    .is-open .collapse-content { grid-template-rows: 1fr; opacity: 1; padding-top: 12px; }
    .is-open .arrow-icon { transform: rotate(90deg); }
    .arrow-icon { transition: transform 0.25s ease; }
    .inner-content { overflow: hidden; }

    /* ── Pill filters ── */
    .pill { border-radius: 99px; padding: 6px 16px; font-size: 12px; font-weight: 700; transition: all 0.2s; white-space: nowrap; }
    .pill.on { background: var(--green); color: #fff; box-shadow: 0 2px 8px rgba(58,81,41,0.3); }
    .pill.off { background: #fff; color: #999; border: 1px solid #e5e5e5; }

    /* ── Form overlay ── */
    .form-overlay { background: rgba(0,0,0,0.45); backdrop-filter: blur(6px); }
    .form-sheet { border-radius: 28px 28px 0 0; background: var(--bg); }
    .form-field-row { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid #f0f0f0; }
    .form-field-row:last-child { border-bottom: none; }
    .form-field-label { width: 72px; font-size: 13px; color: var(--sub); font-weight: 500; flex-shrink: 0; }
    .form-field-input { flex: 1; background: transparent; font-size: 14px; outline: none; }

    /* ── Misc ── */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .hidden-input { position: absolute; width: 1px; height: 1px; opacity: 0; overflow: hidden; }
    .btn-press:active { transform: scale(0.94); opacity: 0.75; }
    .badge { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 99px; }

    /* ── Gradient hero ── */
    .dashboard-hero {
        background: linear-gradient(135deg, var(--green) 0%, #2c4220 100%);
        border-radius: 24px;
        position: relative;
        overflow: hidden;
    }
    .dashboard-hero::before {
        content: '';
        position: absolute;
        top: -40px; right: -40px;
        width: 160px; height: 160px;
        background: rgba(255,255,255,0.05);
        border-radius: 50%;
    }
    .dashboard-hero::after {
        content: '';
        position: absolute;
        bottom: -60px; right: 20px;
        width: 120px; height: 120px;
        background: rgba(255,255,255,0.04);
        border-radius: 50%;
    }

    /* ── Trend sparkline ── */
    .sparkline { height: 32px; }

    /* ── Meeting card ── */
    .meeting-card {
        border-left: 4px solid var(--green);
    }

    /* ── Record item status dot ── */
    .record-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--green-pale);
        border: 2px solid var(--green);
        flex-shrink: 0;
        margin-top: 3px;
    }

    /* ── Empty state ── */
    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #bbb;
    }

    /* ── Toast ── */
    #toast {
        transition: opacity 0.3s ease, top 0.3s ease, transform 0.3s ease;
        transform: translateX(-50%);
    }

    /* ── Animate in ── */
    .animate-in {
        animation: slideIn 0.35s ease both;
    }
    @keyframes slideIn {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Month selector ── */
    .month-btn {
        background: #f0f0f0;
        border-radius: 12px;
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 600;
        color: var(--sub);
        transition: all 0.2s;
    }
    .month-btn:hover { background: var(--green-pale); color: var(--green); }

    /* ── FAB Add Button ── */
    .add-fab {
        background: linear-gradient(145deg, var(--green-light), var(--green));
        box-shadow: 0 4px 20px rgba(58,81,41,0.45), 0 2px 8px rgba(0,0,0,0.15);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .add-fab:active {
        transform: scale(0.9);
        box-shadow: 0 2px 10px rgba(58,81,41,0.3);
    }
</style>

<div id="repairForm" class="hidden fixed inset-0 z-[100] form-overlay flex items-end">
    <div class="form-sheet w-full max-h-[96vh] overflow-y-auto p-5 animate-in">
        <div class="w-10 h-1.5 bg-stone-300 rounded-full mx-auto mb-5"></div>
        <div class="flex justify-between items-center mb-5">
            <h2 id="formTitle" class="text-xl font-black">新增紀錄</h2>
            <button onclick="closeForm()" class="text-blue-600 font-semibold">取消</button>
        </div>
        <form onsubmit="saveRecord(event)" class="space-y-3">
            <!-- 基本資訊 -->
            <div class="card p-0 overflow-hidden">
                <div class="form-field-row">
                    <span class="form-field-label">廠別</span>
                    <input type="text" id="f_factory" class="form-field-input" placeholder="輸入廠別名稱" required list="factory-list">
                    <datalist id="factory-list"></datalist>
                </div>
                <div class="form-field-row">
                    <span class="form-field-label">時間</span>
                    <input type="datetime-local" id="f_datetime" class="form-field-input">
                </div>
                <div class="form-field-row">
                    <span class="form-field-label">機型</span>
                    <input type="text" id="f_model" class="form-field-input" placeholder="設備機型" required>
                </div>
                <div class="form-field-row">
                    <span class="form-field-label">機號</span>
                    <input type="text" id="f_sn" class="form-field-input" placeholder="序號（選填）">
                </div>
            </div>
            <!-- 內容 -->
            <div class="card p-4">
                <input type="text" id="f_item" placeholder="維修項目（標題）" class="w-full bg-transparent text-sm font-bold outline-none mb-3 border-b border-stone-100 pb-3 text-stone-800 placeholder-stone-300">
                <textarea id="f_content" rows="5" placeholder="描述處理細節、故障原因、使用零件..." class="w-full bg-transparent text-sm outline-none text-stone-700 placeholder-stone-300 resize-none" required></textarea>
            </div>
            <!-- 照片 + 送出 -->
            <div class="flex gap-3">
                <div class="flex-1 relative card p-4 text-center cursor-pointer">
                    <input type="file" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="processImage(this)">
                    <div id="imgPreviewContainer" class="hidden">
                        <img id="imgPreview" src="" class="max-h-14 mx-auto rounded-lg shadow">
                        <p class="text-[10px] text-stone-400 mt-1">點擊更換</p>
                    </div>
                    <div id="uploadPrompt" class="text-stone-400 text-[11px] font-bold">
                        <i data-lucide="camera" class="w-5 h-5 mx-auto mb-1 text-stone-300"></i>
                        添加照片
                    </div>
                </div>
                <button type="submit" id="saveBtn" class="flex-[2.5] bg-[var(--green)] text-white py-4 rounded-2xl font-black text-sm shadow-md btn-press">
                    儲存紀錄
                </button>
            </div>
        </form>
    </div>
</div>

<div id="importModal" class="hidden fixed inset-0 z-[150] form-overlay flex items-end">
    <div class="form-sheet w-full p-5 animate-in">
        <div class="w-10 h-1.5 bg-stone-300 rounded-full mx-auto mb-5"></div>
        <h2 class="text-xl font-black mb-1">匯入還原</h2>
        <p class="text-xs text-stone-400 mb-4">⚠️ 匯入將覆蓋目前所有資料，請先備份！</p>
        <div class="flex bg-stone-100 rounded-2xl p-1 mb-4">
            <button onclick="switchImportTab('file')" id="importTabFile" class="flex-1 py-2 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-stone-700">📂 選擇檔案</button>
            <button onclick="switchImportTab('paste')" id="importTabPaste" class="flex-1 py-2 rounded-xl text-xs font-bold transition-all text-stone-400">📋 貼上 JSON</button>
        </div>
        <div id="importFileTab">
            <label class="w-full border-2 border-dashed border-stone-200 rounded-2xl py-8 flex flex-col items-center gap-2 cursor-pointer hover:border-[var(--green)] hover:bg-[var(--green-pale)] transition-all block">
                <i data-lucide="file-json" class="w-8 h-8 text-stone-300"></i>
                <span class="text-sm font-bold text-stone-500">點擊選擇備份檔案</span>
                <span class="text-[10px] text-stone-400">支援 .json 格式</span>
                <input type="file" class="hidden" accept=".json,.txt" onchange="importFromFile(this)">
            </label>
        </div>
        <div id="importPasteTab" class="hidden">
            <textarea id="importPasteText" rows="7" placeholder="將備份的 JSON 文字貼在這裡..."
                class="w-full bg-stone-100 rounded-2xl p-4 text-[11px] font-mono text-stone-700 outline-none resize-none border border-stone-200 mb-3 focus:border-[var(--green)] focus:bg-white transition-all"></textarea>
            <button onclick="importFromPaste()" class="w-full bg-[var(--green)] text-white py-4 rounded-2xl font-black text-sm btn-press flex items-center justify-center gap-2">
                <i data-lucide="check-circle" class="w-4 h-4"></i> 確認還原
            </button>
        </div>
        <button onclick="closeImportModal()" class="w-full mt-3 py-3 rounded-2xl font-bold text-sm text-stone-500">取消</button>
    </div>
</div>

<script>
// ────────────────────────────────────────────
// Core Data — 永恆金鑰（升級不遺失資料）
// 讀取順序：新 key → 舊 key v2 → 原始 key，並自動統一寫入新 key
// ────────────────────────────────────────────
const DB_KEY      = 'FIXLOG_MASTER_DATABASE';   // 統一使用此 key
const LEGACY_KEYS = [
    'FIXLOG_MASTER_DATABASE',   // v3（同名，保險起見列入）
    'fixlog_records',           // 可能的舊版 key
    'fixlog-data',
    'FL_RECORDS'
];

function loadRecordsFromStorage() {
    // 嘗試每個 key，找到第一個有資料的
    for (const key of LEGACY_KEYS) {
        try {
            const raw = localStorage.getItem(key);
            if (raw) {
                const parsed = JSON.parse(raw);
                if (Array.isArray(parsed) && parsed.length > 0) {
                    // 統一寫回主 key
                    localStorage.setItem(DB_KEY, raw);
                    return parsed;
                }
            }
        } catch(e) {}
    }
    return [];
}

let records = loadRecordsFromStorage();
let currentImageData = null;
let selectedFactory = '全部';
let editModeId = null;
let statYear = new Date().getFullYear();
let statMonth = new Date().getMonth();

// ────────────────────────────────────────────
// Tab Navigation
// ────────────────────────────────────────────
const pageTitles = { dash: '查修日誌', records: '維修紀錄' };
function switchPage(name, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.remove('active');
        b.querySelector('.tab-indicator').style.opacity = '0';
    });
    document.getElementById('page-' + name).classList.add('active');
    btn.classList.add('active');
    btn.querySelector('.tab-indicator').style.opacity = '1';
    document.getElementById('navTitle').innerText = pageTitles[name];
    if (name === 'records') renderRecords();
    if (name === 'dash') renderDashboard();
}

// ────────────────────────────────────────────
// Dashboard
// ────────────────────────────────────────────
function setStatMonth(delta) {
    statMonth += delta;
    if (statMonth > 11) { statMonth = 0; statYear++; }
    if (statMonth < 0) { statMonth = 11; statYear--; }
    renderDashboard();
}

function renderDashboard() {
    const now = new Date();
    const thisM = now.getMonth(), thisY = now.getFullYear();
    const lastM = thisM === 0 ? 11 : thisM - 1;
    const lastY = thisM === 0 ? thisY - 1 : thisY;

    // Hero numbers
    const monthRecs = records.filter(r => {
        const d = new Date(r.datetime);
        return d.getMonth() === thisM && d.getFullYear() === thisY;
    });
    const lastMonthRecs = records.filter(r => {
        const d = new Date(r.datetime);
        return d.getMonth() === lastM && d.getFullYear() === lastY;
    });
    const weekAgo = new Date(now - 7 * 86400000);
    const weekRecs = records.filter(r => new Date(r.datetime) >= weekAgo);
    const factories = new Set(records.map(r => r.factory));

    animateNum('heroMonthCount', monthRecs.length);
    animateNum('heroTotal', records.length);
    animateNum('heroFactories', factories.size);
    animateNum('heroWeek', weekRecs.length);

    const mm = document.getElementById('heroMonthLabel');
    mm.innerText = `${thisY}年${thisM+1}月`;
    const mom = document.getElementById('heroMoM');
    if (lastMonthRecs.length === 0) {
        mom.innerText = '—';
    } else {
        const pct = Math.round((monthRecs.length - lastMonthRecs.length) / lastMonthRecs.length * 100);
        mom.innerText = (pct >= 0 ? '+' : '') + pct + '%';
        mom.style.color = pct >= 0 ? '#a3c97c' : '#f87171';
    }

    // Stat month label
    document.getElementById('statMonthLabel').innerText = `${statYear}年${statMonth+1}月`;

    // Factory chart for statMonth
    const statRecs = records.filter(r => {
        const d = new Date(r.datetime);
        return d.getMonth() === statMonth && d.getFullYear() === statYear;
    });
    const factChart = document.getElementById('factoryChart');
    const factEmpty = document.getElementById('factoryEmpty');
    if (statRecs.length === 0) {
        factChart.classList.add('hidden');
        factEmpty.classList.remove('hidden');
    } else {
        factChart.classList.remove('hidden');
        factEmpty.classList.add('hidden');
        const counts = {};
        statRecs.forEach(r => { counts[r.factory] = (counts[r.factory] || 0) + 1; });
        const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
        const max = sorted[0][1];
        const colors = ['#3a5129','#4e6e36','#6b8f4a','#8fb366','#b5d68f','#d4e8b8'];
        factChart.innerHTML = sorted.map(([fac, cnt], i) => `
            <div class="flex items-center gap-3">
                <div class="w-16 text-[11px] font-bold text-stone-600 text-right flex-shrink-0 truncate">${fac}</div>
                <div class="flex-1 bar-wrap">
                    <div class="bar-fill" data-width="${cnt/max*100}" style="background:${colors[i%colors.length]}; width:0"></div>
                </div>
                <div class="stat-num text-sm font-bold text-stone-700 w-6 text-right">${cnt}</div>
            </div>
        `).join('');
        // Animate bars
        requestAnimationFrame(() => {
            factChart.querySelectorAll('.bar-fill').forEach(el => {
                el.style.width = el.dataset.width + '%';
            });
        });
    }

    // Week trend
    const trendWrap = document.getElementById('weekTrendChart');
    const trendLabels = document.getElementById('weekTrendLabels');
    const days = [];
    for (let i = 6; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i);
        d.setHours(0,0,0,0);
        const next = new Date(d); next.setDate(next.getDate()+1);
        const cnt = records.filter(r => { const rd = new Date(r.datetime); return rd >= d && rd < next; }).length;
        const wd = ['日','一','二','三','四','五','六'][d.getDay()];
        days.push({ cnt, label: wd, isToday: i === 0 });
    }
    const maxDay = Math.max(...days.map(d => d.cnt), 1);
    const barColors = days.map(d => d.isToday ? 'var(--green)' : '#dde8d5');
    trendWrap.innerHTML = days.map((d,i) => `
        <div class="flex-1 flex flex-col items-center justify-end gap-1">
            <span class="stat-num text-[10px] font-bold ${d.cnt > 0 ? 'text-stone-600' : 'text-transparent'}">${d.cnt || ''}</span>
            <div class="w-full rounded-t-lg transition-all duration-700" style="height:${Math.max(d.cnt/maxDay*56,4)}px; background:${barColors[i]}"></div>
        </div>
    `).join('');
    trendLabels.innerHTML = days.map((d,i) => `
        <div class="flex-1 text-center text-[10px] font-bold ${d.isToday ? 'text-[var(--green)]' : 'text-stone-400'}">${d.label}</div>
    `).join('');

    lucide.createIcons();
}

function animateNum(id, target) {
    const el = document.getElementById(id);
    const start = parseInt(el.innerText) || 0;
    const dur = 600;
    const startTime = performance.now();
    function step(t) {
        const progress = Math.min((t - startTime) / dur, 1);
        const ease = 1 - Math.pow(1 - progress, 3);
        el.innerText = Math.round(start + (target - start) * ease);
        if (progress < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
}

// ────────────────────────────────────────────
// Meeting Reminder
// ────────────────────────────────────────────
function updateMeeting() {
    const now = new Date(); now.setHours(0,0,0,0);
    let target;
    const manualDate = localStorage.getItem('fixlog_manual_meeting');
    const resetBtn = document.getElementById('resetMeetingBtn');
    if (manualDate) {
        target = new Date(manualDate);
        resetBtn.classList.remove('hidden');
        document.getElementById('meetingStatus').innerText = "📍 目前為手動設定日期";
    } else {
        const currentDay = now.getDay();
        const daysToFri = (currentDay <= 5) ? (5 - currentDay) : (12 - currentDay);
        target = new Date(now.getTime() + daysToFri * 24 * 60 * 60 * 1000);
        resetBtn.classList.add('hidden');
        document.getElementById('meetingStatus').innerText = "✨ 自動計算：本週五開會";
    }
    document.getElementById('meetingDateText').innerText = `${target.getFullYear()}年${target.getMonth()+1}月${target.getDate()}日`;
    const diff = Math.ceil((target - now) / 86400000);
    const dc = document.getElementById('daysCount');
    if (diff === 0) { dc.innerText = "今天"; dc.className = "badge bg-red-100 text-red-600"; }
    else if (diff < 0) { dc.innerText = `已過 ${Math.abs(diff)} 天`; dc.className = "badge bg-stone-100 text-stone-400"; }
    else { dc.innerText = `剩餘 ${diff} 天`; dc.className = "badge bg-[var(--green-pale)] text-[var(--green)]"; }
}
function handleManualDate(val) {
    if (!val) return;
    localStorage.setItem('fixlog_manual_meeting', val);
    updateMeeting(); showToast("📅 月會日期已更新");
}
function resetMeetingDate(e) {
    if (e) e.stopPropagation();
    localStorage.removeItem('fixlog_manual_meeting');
    updateMeeting(); showToast("🔄 已恢復自動計算");
}

// ────────────────────────────────────────────
// Records Page
// ────────────────────────────────────────────
function renderRecords() {
    const s = document.getElementById('searchInput').value.toLowerCase();
    const list = document.getElementById('recordList');
    const fr = document.getElementById('factoryFilterRow');
    const facs = ['全部', ...new Set(records.map(r => r.factory))];
    fr.innerHTML = facs.map(f => `
        <button onclick="setFilter('${f}')" class="pill ${selectedFactory === f ? 'on' : 'off'}">${f}</button>
    `).join('');
    const res = records.filter(r => {
        const m = r.model.toLowerCase().includes(s) || r.content.toLowerCase().includes(s) || r.factory.toLowerCase().includes(s) || r.item.toLowerCase().includes(s);
        return m && (selectedFactory === '全部' || r.factory === selectedFactory);
    });
    const sc = document.getElementById('searchCount');
    sc.innerText = s || selectedFactory !== '全部' ? `${res.length} 筆` : '';
    if (res.length === 0) {
        list.innerHTML = `<div class="empty-state">
            <i data-lucide="search-x" class="w-8 h-8 mx-auto mb-2 opacity-30"></i>
            <p class="text-sm font-medium">找不到符合的紀錄</p>
            <p class="text-xs mt-1 opacity-60">試試其他關鍵字</p>
        </div>`;
    } else {
        list.innerHTML = res.map((r, idx) => `
            <div class="card mb-3 animate-in" data-card-id="${r.id}" style="animation-delay:${idx * 0.04}s">
                <div class="p-4">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-start gap-2 flex-1 min-w-0">
                            <div class="record-dot mt-1.5"></div>
                            <div class="min-w-0">
                                <div class="flex items-center gap-2 flex-wrap">
                                    <span class="text-[10px] font-black text-[var(--green)] bg-[var(--green-pale)] px-2 py-0.5 rounded-full">${r.factory}</span>
                                    <span class="text-[10px] text-stone-400 font-mono">${r.datetime}</span>
                                </div>
                                <h3 class="font-black text-[15px] text-stone-900 mt-1 leading-tight">${r.model} <span class="text-xs text-stone-400 font-normal">#${r.sn}</span></h3>
                                <p class="text-[11px] font-bold text-stone-500 mt-0.5">${r.item}</p>
                            </div>
                        </div>
                        <div class="flex gap-2 items-center ml-2 flex-shrink-0">
                            <button data-action="edit" data-id="${r.id}"
                                class="flex items-center gap-1.5 bg-stone-100 active:bg-stone-200 active:scale-95 px-3 py-1.5 rounded-xl transition-all">
                                <i data-lucide="pencil" class="w-3.5 h-3.5 text-stone-500 pointer-events-none"></i>
                                <span class="text-[11px] font-bold text-stone-500 pointer-events-none">編輯</span>
                            </button>
                            <button data-action="copy" data-id="${r.id}"
                                class="flex items-center gap-1.5 bg-blue-50 active:bg-blue-100 active:scale-95 px-3 py-1.5 rounded-xl transition-all">
                                <i data-lucide="copy" class="w-3.5 h-3.5 text-blue-500 pointer-events-none"></i>
                                <span class="text-[11px] font-bold text-blue-500 pointer-events-none">複製</span>
                            </button>
                            <i data-lucide="chevron-right" class="arrow-icon w-4 h-4 text-stone-300 pointer-events-none"></i>
                        </div>
                    </div>
                    <div class="collapse-content">
                        <div class="inner-content">
                            <div class="bg-stone-50 rounded-xl p-3 text-sm text-stone-600 leading-relaxed border border-stone-100 mt-1">${r.content.replace(/\n/g,'<br>')}</div>
                            ${r.image ? `<img src="${r.image}" class="w-full mt-3 rounded-2xl shadow-sm object-cover max-h-48">` : ''}
                            <div class="flex justify-end mt-3 pt-2 border-t border-stone-100">
                                <button data-action="delete" data-id="${r.id}"
                                    class="flex items-center gap-1.5 bg-red-50 active:bg-red-100 active:scale-95 px-4 py-2 rounded-xl transition-all">
                                    <i data-lucide="trash-2" class="w-3.5 h-3.5 text-red-500 pointer-events-none"></i>
                                    <span class="text-xs font-bold text-red-500 pointer-events-none">刪除紀錄</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }
    lucide.createIcons();
}

function setFilter(f) { selectedFactory = f; renderRecords(); }

// ── 事件委派：掛在 recordList 容器，處理所有卡片互動 ──
document.getElementById('recordList').addEventListener('click', function(e) {
    const actionBtn = e.target.closest('[data-action]');
    const card = e.target.closest('[data-card-id]');
    if (!card) return;

    if (actionBtn) {
        e.stopPropagation();
        const action = actionBtn.dataset.action;
        const id = actionBtn.dataset.id;
        if (action === 'edit')   openFormForEdit(id);
        if (action === 'copy')   copyRecord(id);
        if (action === 'delete') deleteRecord(id);
    } else {
        card.classList.toggle('is-open');
    }
});

// ────────────────────────────────────────────
// Form
// ────────────────────────────────────────────
function openFormForAdd() {
    editModeId = null;
    document.querySelector('form').reset();
    document.getElementById('formTitle').innerText = "新增紀錄";
    document.getElementById('saveBtn').innerText = "儲存紀錄";
    currentImageData = null;
    document.getElementById('imgPreviewContainer').classList.add('hidden');
    document.getElementById('uploadPrompt').classList.remove('hidden');
    const n = new Date(); n.setMinutes(n.getMinutes() - n.getTimezoneOffset());
    document.getElementById('f_datetime').value = n.toISOString().slice(0, 16);
    // Populate factory datalist
    const dl = document.getElementById('factory-list');
    dl.innerHTML = [...new Set(records.map(r => r.factory))].map(f => `<option value="${f}">`).join('');
    document.getElementById('repairForm').classList.remove('hidden');
}
function openFormForEdit(id) {
    const r = records.find(x => x.id === id); if (!r) return;
    editModeId = id;
    document.getElementById('formTitle').innerText = "編輯紀錄";
    document.getElementById('saveBtn').innerText = "更新紀錄";
    document.getElementById('f_factory').value = r.factory;
    document.getElementById('f_datetime').value = r.datetime.replace(' ', 'T');
    document.getElementById('f_model').value = r.model;
    document.getElementById('f_sn').value = r.sn === '-' ? '' : r.sn;
    document.getElementById('f_item').value = r.item;
    document.getElementById('f_content').value = r.content;
    if (r.image) {
        currentImageData = r.image;
        document.getElementById('imgPreview').src = r.image;
        document.getElementById('imgPreviewContainer').classList.remove('hidden');
        document.getElementById('uploadPrompt').classList.add('hidden');
    } else {
        currentImageData = null;
        document.getElementById('imgPreviewContainer').classList.add('hidden');
        document.getElementById('uploadPrompt').classList.remove('hidden');
    }
    document.getElementById('repairForm').classList.remove('hidden');
}
function closeForm() { document.getElementById('repairForm').classList.add('hidden'); }

function processImage(input) {
    const file = input.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height, max = 900;
            if (w > h && w > max) { h *= max/w; w = max; }
            else if (h > max) { w *= max/h; h = max; }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            currentImageData = canvas.toDataURL('image/jpeg', 0.7);
            document.getElementById('imgPreview').src = currentImageData;
            document.getElementById('imgPreviewContainer').classList.remove('hidden');
            document.getElementById('uploadPrompt').classList.add('hidden');
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

function saveRecord(e) {
    e.preventDefault();
    const d = {
        factory: document.getElementById('f_factory').value.trim(),
        datetime: document.getElementById('f_datetime').value.replace('T', ' '),
        model: document.getElementById('f_model').value.trim(),
        sn: document.getElementById('f_sn').value.trim() || '-',
        item: document.getElementById('f_item').value.trim() || '未分類',
        content: document.getElementById('f_content').value.trim(),
        image: currentImageData
    };
    if (editModeId) {
        const i = records.findIndex(x => x.id === editModeId);
        records[i] = { ...records[i], ...d };
        showToast("✅ 紀錄已更新");
    } else {
        records.unshift({ id: "ID" + Date.now(), ...d });
        showToast("✅ 紀錄已儲存");
    }
    localStorage.setItem(DB_KEY, JSON.stringify(records));
    closeForm(); renderDashboard();
    // Switch to records page briefly if already there
    if (document.getElementById('page-records').classList.contains('active')) renderRecords();
}

// ────────────────────────────────────────────
// CRUD helpers
// ────────────────────────────────────────────
function deleteRecord(id) {
    if (confirm('確定刪除此紀錄？')) {
        records = records.filter(r => r.id !== id);
        localStorage.setItem(DB_KEY, JSON.stringify(records));
        renderRecords(); renderDashboard(); showToast("🗑 紀錄已移除");
    }
}
function copyRecord(id) {
    const r = records.find(x => x.id === id);
    const text = `【FixLog 維修回報】\n廠別：${r.factory}\n時間：${r.datetime}\n設備：${r.model} #${r.sn}\n項目：${r.item}\n內容：${r.content}`;
    navigator.clipboard.writeText(text).then(() => showToast("📋 已複製到剪貼簿"));
}

// ────────────────────────────────────────────
// Import / Export — cross-platform (iOS + Desktop)
// ────────────────────────────────────────────
function isIOS() {
    return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
           (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}

// ── Export ──
function exportData() {
    if (records.length === 0) { showToast("❌ 目前沒有紀錄可匯出"); return; }
    const json = JSON.stringify(records, null, 2);
    const desc = document.getElementById('exportDesc');
    const desktop = document.getElementById('exportDesktopArea');
    const ios = document.getElementById('exportIosArea');

    if (isIOS()) {
        // iOS: show copyable textarea
        desc.innerText = `共 ${records.length} 筆紀錄 — 複製後儲存至備忘錄`;
        desktop.classList.add('hidden');
        ios.classList.remove('hidden');
        document.getElementById('exportJsonText').value = json;
    } else {
        // Desktop: normal file download
        desc.innerText = `共 ${records.length} 筆紀錄`;
        desktop.classList.remove('hidden');
        ios.classList.add('hidden');
    }
    document.getElementById('exportModal').classList.remove('hidden');
    lucide.createIcons();
}
function doFileDownload() {
    const json = JSON.stringify(records, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `FixLog_Backup_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
    showToast("💾 備份檔案已下載");
    closeExportModal();
}
function copyExportJson() {
    const text = document.getElementById('exportJsonText').value;
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => showToast("📋 JSON 已複製，請貼到備忘錄"));
    } else {
        // Fallback: select and execCommand
        const ta = document.getElementById('exportJsonText');
        ta.select(); ta.setSelectionRange(0, 99999);
        document.execCommand('copy');
        showToast("📋 JSON 已複製");
    }
}
function closeExportModal() {
    document.getElementById('exportModal').classList.add('hidden');
}

// ── Import ──
function openImportModal() {
    switchImportTab('file');
    document.getElementById('importPasteText').value = '';
    document.getElementById('importModal').classList.remove('hidden');
    lucide.createIcons();
}
function closeImportModal() {
    document.getElementById('importModal').classList.add('hidden');
}
function switchImportTab(tab) {
    const fileTab = document.getElementById('importFileTab');
    const pasteTab = document.getElementById('importPasteTab');
    const btnFile = document.getElementById('importTabFile');
    const btnPaste = document.getElementById('importTabPaste');
    if (tab === 'file') {
        fileTab.classList.remove('hidden'); pasteTab.classList.add('hidden');
        btnFile.className = 'flex-1 py-2 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-stone-700';
        btnPaste.className = 'flex-1 py-2 rounded-xl text-xs font-bold transition-all text-stone-400';
    } else {
        fileTab.classList.add('hidden'); pasteTab.classList.remove('hidden');
        btnPaste.className = 'flex-1 py-2 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-stone-700';
        btnFile.className = 'flex-1 py-2 rounded-xl text-xs font-bold transition-all text-stone-400';
    }
}
function importFromFile(input) {
    const file = input.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) { processImportJSON(e.target.result); };
    reader.readAsText(file);
    input.value = '';
}
function importFromPaste() {
    const text = document.getElementById('importPasteText').value.trim();
    if (!text) { showToast("❌ 請先貼上 JSON 內容"); return; }
    processImportJSON(text);
}
function processImportJSON(text) {
    try {
        const imported = JSON.parse(text);
        if (!Array.isArray(imported)) throw new Error();
        if (confirm(`確定要匯入 ${imported.length} 筆紀錄嗎？這將覆蓋目前所有資料！`)) {
            records = imported;
            localStorage.setItem(DB_KEY, JSON.stringify(records));
            renderDashboard(); renderRecords();
            closeImportModal();
            showToast("✅ 資料還原成功");
        }
    } catch(err) {
        showToast("❌ 格式錯誤，請確認是正確的備份檔");
    }
}

// ────────────────────────────────────────────
// Toast
// ────────────────────────────────────────────
function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.style.opacity = '1';
    t.style.top = '60px';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.opacity = '0'; t.style.top = '48px'; }, 2200);
}

// ────────────────────────────────────────────
// Init
// ────────────────────────────────────────────
updateMeeting();
renderDashboard();
lucide.createIcons();

// Set initial tab indicator
document.querySelector('.tab-btn.active .tab-indicator').style.opacity = '1';
</script>
