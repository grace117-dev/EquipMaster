<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaidieLog | 療癒系維修日誌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', 'Noto Sans TC', sans-serif; background-color: #fdf6f0; }
        .card-shadow { box-shadow: 0 8px 30px rgba(221, 196, 181, 0.3); }
        .collapse-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .is-open .collapse-content { max-height: 1000px; transition: max-height 0.5s ease-in; }
        .is-open .arrow-icon { transform: rotate(180deg); }
        input, select, textarea { border: 2px solid #f0e4d7 !important; transition: all 0.2s; }
        input:focus, textarea:focus { border-color: #ffb7b7 !important; background-color: #fff !important; outline: none; }
        .btn-gradient { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); }
    </style>
</head>
<body class="pb-10 text-stone-700">

    <!-- 頂部導航 -->
    <nav class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-orange-100">
        <div class="max-w-2xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-pink-100 p-2 rounded-2xl text-pink-500">
                    <i data-lucide="sparkles" class="w-6 h-6"></i>
                </div>
                <h1 class="text-xl font-extrabold text-stone-800 tracking-tight">Fixie <span class="text-pink-400">Log</span></h1>
            </div>
            <button onclick="toggleForm()" class="btn-gradient text-white p-3 rounded-2xl shadow-lg active:scale-90 transition-transform">
                <i data-lucide="plus" id="plusIcon" class="w-6 h-6 transition-transform"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-6">
        
        <!-- 新增紀錄表單 -->
        <div id="repairForm" class="hidden bg-white rounded-[2rem] card-shadow p-8 mb-10 border border-orange-50 animate-in fade-in slide-in-from-top-4">
            <h2 class="text-lg font-bold text-stone-800 mb-6 flex items-center gap-2 italic">
                ✨ 寫下今天的維修小記...
            </h2>
            
            <form onsubmit="saveRecord(event)" class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-stone-400 ml-1">廠別</label>
                        <input type="text" id="f_factory" placeholder="在哪個廠區？" class="w-full bg-stone-50 rounded-2xl p-3.5" required>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-stone-400 ml-1">日期</label>
                        <input type="date" id="f_date" class="w-full bg-stone-50 rounded-2xl p-3.5 text-stone-500">
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-stone-400 ml-1">機型</label>
                        <input type="text" id="f_model" placeholder="設備名稱" class="w-full bg-stone-50 rounded-2xl p-3.5" required>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-stone-400 ml-1">機號 (ID)</label>
                        <input type="text" id="f_sn" placeholder="設備編號" class="w-full bg-stone-50 rounded-2xl p-3.5">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-stone-400 ml-1">維修項目</label>
                    <input type="text" id="f_item" placeholder="例如：零件更換、故障排除" class="w-full bg-stone-50 rounded-2xl p-3.5">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-stone-400 ml-1">維修細節內容</label>
                    <textarea id="f_content" rows="4" placeholder="今天修了些什麼呢？" class="w-full bg-stone-50 rounded-2xl p-4" required></textarea>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-stone-400 ml-1">上傳照片</label>
                    <div class="relative bg-orange-50 border-2 border-dashed border-orange-200 rounded-[1.5rem] p-6 text-center hover:bg-orange-100 transition cursor-pointer">
                        <input type="file" id="f_image" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="previewImage(this)">
                        <div id="imgPreviewContainer" class="hidden">
                            <img id="imgPreview" src="" class="max-h-48 mx-auto rounded-xl shadow-md border-4 border-white">
                        </div>
                        <div id="uploadPrompt" class="text-orange-300">
                            <i data-lucide="image" class="w-8 h-8 mx-auto mb-1"></i>
                            <span class="text-sm font-bold block">點擊拍張照吧！</span>
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full btn-gradient text-white py-4 rounded-2xl font-extrabold shadow-lg hover:opacity-90 transition active:scale-95">
                    完成記錄 🎉
                </button>
            </form>
        </div>

        <!-- 搜尋與篩選 -->
        <div class="flex flex-col gap-4 mb-8">
            <div class="relative">
                <i data-lucide="search" class="absolute left-4 top-4 w-5 h-5 text-stone-300"></i>
                <input type="text" id="searchInput" oninput="renderRecords()" placeholder="想找哪台設備？" class="w-full pl-12 pr-4 py-4 bg-white border-none rounded-[1.5rem] shadow-sm font-medium">
            </div>
            <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2" id="factoryFilterRow">
                <!-- 動態生成的廠別標籤 -->
            </div>
        </div>

        <!-- 列表 -->
        <div id="recordList" class="space-y-4"></div>

    </main>

    <script>
        let records = JSON.parse(localStorage.getItem('fixie_v3_data')) || [];
        let currentImageData = null;
        let selectedFactory = '全部';

        document.getElementById('f_date').valueAsDate = new Date();

        function toggleForm() {
            const form = document.getElementById('repairForm');
            const plusIcon = document.getElementById('plusIcon');
            form.classList.toggle('hidden');
            plusIcon.style.transform = form.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(45deg)';
        }

        function previewImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentImageData = e.target.result;
                    document.getElementById('imgPreview').src = currentImageData;
                    document.getElementById('imgPreviewContainer').classList.remove('hidden');
                    document.getElementById('uploadPrompt').classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        function saveRecord(e) {
            e.preventDefault();
            const newRecord = {
                id: Date.now(),
                factory: document.getElementById('f_factory').value.trim(),
                date: document.getElementById('f_date').value,
                model: document.getElementById('f_model').value.trim(),
                sn: document.getElementById('f_sn').value.trim() || 'N/A',
                item: document.getElementById('f_item').value.trim() || '一般查修',
                content: document.getElementById('f_content').value.trim(),
                image: currentImageData
            };

            records.unshift(newRecord);
            localStorage.setItem('fixie_v3_data', JSON.stringify(records));
            e.target.reset();
            currentImageData = null;
            document.getElementById('imgPreviewContainer').classList.add('hidden');
            document.getElementById('uploadPrompt').classList.remove('hidden');
            toggleForm();
            renderRecords();
        }

        function deleteRecord(id, event) {
            event.stopPropagation();
            if(confirm('確定要刪除這筆可愛的紀錄嗎？')) {
                records = records.filter(r => r.id !== id);
                localStorage.setItem('fixie_v3_data', JSON.stringify(records));
                renderRecords();
            }
        }

        function toggleAccordion(el) {
            el.classList.toggle('is-open');
        }

        function setFilter(f) {
            selectedFactory = f;
            renderRecords();
        }

        function renderRecords() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const listElement = document.getElementById('recordList');
            const filterRow = document.getElementById('factoryFilterRow');
            
            // 更新廠別篩選按鈕
            const factories = ['全部', ...new Set(records.map(r => r.factory))];
            filterRow.innerHTML = factories.map(f => `
                <button onclick="setFilter('${f}')" class="whitespace-nowrap px-5 py-2 rounded-full font-bold text-sm transition ${selectedFactory === f ? 'bg-pink-400 text-white shadow-md' : 'bg-white text-stone-400'} border border-orange-50">
                    ${f}
                </button>
            `).join('');

            const filtered = records.filter(r => {
                const matchSearch = r.model.toLowerCase().includes(searchTerm) || r.content.toLowerCase().includes(searchTerm) || r.sn.toLowerCase().includes(searchTerm);
                const matchFactory = selectedFactory === '全部' || r.factory === selectedFactory;
                return matchSearch && matchFactory;
            });

            listElement.innerHTML = filtered.map(r => `
                <div class="bg-white rounded-[1.8rem] card-shadow border border-orange-50 overflow-hidden cursor-pointer transition-transform active:scale-[0.99]" onclick="toggleAccordion(this)">
                    <div class="p-5 flex justify-between items-center">
                        <div class="flex flex-col gap-1">
                            <div class="flex gap-2 items-center">
                                <span class="bg-orange-100 text-orange-500 text-[10px] font-extrabold px-2 py-0.5 rounded-lg uppercase tracking-wider">${r.factory}</span>
                                <span class="text-stone-300 text-[10px] font-bold">${r.date}</span>
                            </div>
                            <h3 class="text-stone-700 font-extrabold flex items-center gap-1">
                                ${r.model} <span class="text-pink-300 text-xs font-normal">#${r.sn}</span>
                            </h3>
                            <p class="text-pink-400 text-xs font-bold italic">● ${r.item}</p>
                        </div>
                        <i data-lucide="chevron-down" class="arrow-icon w-5 h-5 text-stone-300 transition-transform"></i>
                    </div>
                    
                    <div class="collapse-content">
                        <div class="p-5 pt-0 border-t border-orange-50/50">
                            <div class="bg-stone-50 rounded-2xl p-4 text-sm text-stone-500 leading-relaxed mb-4 whitespace-pre-wrap">
                                ${r.content}
                            </div>
                            ${r.image ? `<img src="${r.image}" class="w-full rounded-2xl border-4 border-white shadow-sm mb-4">` : ''}
                            <div class="flex justify-end">
                                <button onclick="deleteRecord(${r.id}, event)" class="flex items-center gap-1 text-stone-300 hover:text-red-300 text-xs font-bold transition">
                                    <i data-lucide="trash-2" class="w-3 h-3"></i> 刪除紀錄
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            if(filtered.length === 0) {
                listElement.innerHTML = `<div class="text-center py-20 opacity-30 font-bold">
                    <i data-lucide="coffee" class="w-10 h-10 mx-auto mb-2"></i> 沒有紀錄呢...休息一下吧？</div>`;
            }

            lucide.createIcons();
        }

        renderRecords();
        lucide.createIcons();
    </script>
</body>
</html>
