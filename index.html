<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixLog | 自定義設備紀錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <!-- 頂部導航 -->
    <nav class="bg-slate-900 text-white sticky top-0 z-30 shadow-lg">
        <div class="max-w-4xl mx-auto px-4 h-16 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight flex items-center gap-2">
                <i data-lucide="settings" class="w-6 h-6 text-blue-400"></i> FixLog
            </h1>
            <button onclick="toggleForm()" id="addBtn" class="bg-blue-600 hover:bg-blue-500 p-2 rounded-full transition-all shadow-lg active:scale-90">
                <i data-lucide="plus" id="plusIcon" class="transition-transform duration-300"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4">
        
        <!-- 新增紀錄表單 -->
        <div id="repairForm" class="hidden bg-white rounded-2xl shadow-xl border border-slate-200 p-6 mb-6 animate-in fade-in slide-in-from-top-4 duration-300">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="pen-tool" class="text-blue-600 w-5 h-5"></i> 新增查修紀錄
                </h2>
                <button onclick="toggleForm()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <form onsubmit="saveRecord(event)" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-600 mb-1">廠別 / 部門</label>
                        <input type="text" id="f_factory" placeholder="例如：一廠、組裝線" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-600 mb-1">日期</label>
                        <input type="date" id="f_date" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">設備機型</label>
                    <input type="text" id="f_model" placeholder="輸入設備名稱或型號" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">維修項目</label>
                    <input type="text" id="f_item" placeholder="例如：更換感應器、歲修" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">維修內容詳述</label>
                    <textarea id="f_content" rows="4" placeholder="詳細記錄故障原因與處理過程..." class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500" required></textarea>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">異常照片</label>
                    <div class="relative border-2 border-dashed border-slate-200 rounded-2xl p-6 text-center hover:bg-slate-50 transition cursor-pointer">
                        <input type="file" id="f_image" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="previewImage(this)">
                        <div id="imgPreviewContainer" class="hidden">
                            <img id="imgPreview" src="" class="max-h-60 mx-auto rounded-lg shadow-md border border-white">
                            <p class="text-xs text-blue-500 mt-3 font-medium">點擊更換照片</p>
                        </div>
                        <div id="uploadPrompt">
                            <i data-lucide="camera" class="w-10 h-10 text-slate-300 mx-auto mb-2"></i>
                            <span class="text-sm text-slate-500 block font-medium">拍攝或上傳異常照片</span>
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-slate-800 shadow-xl transition active:scale-[0.98]">
                    儲存維修紀錄
                </button>
            </form>
        </div>

        <!-- 搜尋與動態篩選列 -->
        <div class="flex flex-col md:flex-row gap-3 mb-8 mt-4">
            <div class="relative flex-1">
                <i data-lucide="search" class="absolute left-4 top-3.5 w-5 h-5 text-slate-400"></i>
                <input type="text" id="searchInput" oninput="renderRecords()" placeholder="關鍵字搜尋 (機型、內容...)" class="w-full pl-12 pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-blue-500 font-medium">
            </div>
            <select id="factoryFilter" onchange="renderRecords()" class="bg-white border border-slate-200 rounded-2xl px-6 py-3.5 shadow-sm outline-none font-bold text-slate-600 appearance-none">
                <option value="全部">所有廠別</option>
            </select>
        </div>

        <!-- 列表標題 -->
        <div class="flex justify-between items-center mb-4 px-2">
            <h3 class="font-bold text-slate-500 text-sm uppercase tracking-widest">歷史紀錄</h3>
            <span id="recordCount" class="text-xs font-bold bg-slate-200 text-slate-600 px-2.5 py-1 rounded-full">0 筆</span>
        </div>

        <!-- 紀錄列表 -->
        <div id="recordList" class="space-y-5"></div>

    </main>

    <script>
        let records = JSON.parse(localStorage.getItem('fixlog_v2_data')) || [];
        let currentImageData = null;

        // 初始化日期
        document.getElementById('f_date').valueAsDate = new Date();

        function toggleForm() {
            const form = document.getElementById('repairForm');
            const plusIcon = document.getElementById('plusIcon');
            form.classList.toggle('hidden');
            plusIcon.style.transform = form.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(45deg)';
            if(!form.classList.contains('hidden')) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function previewImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImageData = e.target.result;
                    document.getElementById('imgPreview').src = currentImageData;
                    document.getElementById('imgPreviewContainer').classList.remove('hidden');
                    document.getElementById('uploadPrompt').classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        function saveRecord(e) {
            e.preventDefault();
            const newRecord = {
                id: Date.now(),
                factory: document.getElementById('f_factory').value.trim(),
                date: document.getElementById('f_date').value,
                model: document.getElementById('f_model').value.trim(),
                item: document.getElementById('f_item').value.trim() || '未分類',
                content: document.getElementById('f_content').value.trim(),
                image: currentImageData
            };

            records.unshift(newRecord);
            localStorage.setItem('fixlog_v2_data', JSON.stringify(records));
            
            // 重置
            e.target.reset();
            document.getElementById('f_date').valueAsDate = new Date();
            currentImageData = null;
            document.getElementById('imgPreviewContainer').classList.add('hidden');
            document.getElementById('uploadPrompt').classList.remove('hidden');
            
            toggleForm();
            updateFactoryFilter();
            renderRecords();
        }

        function deleteRecord(id) {
            if(confirm('確定要永久刪除此紀錄嗎？')) {
                records = records.filter(r => r.id !== id);
                localStorage.setItem('fixlog_v2_data', JSON.stringify(records));
                updateFactoryFilter();
                renderRecords();
            }
        }

        // 動態更新下拉選單中的「廠別」選項
        function updateFactoryFilter() {
            const filter = document.getElementById('factoryFilter');
            const uniqueFactories = [...new Set(records.map(r => r.factory))].sort();
            const currentValue = filter.value;
            
            filter.innerHTML = '<option value="全部">所有廠別</option>';
            uniqueFactories.forEach(f => {
                if(f) {
                    const opt = document.createElement('option');
                    opt.value = f;
                    opt.textContent = f;
                    filter.appendChild(opt);
                }
            });
            filter.value = currentValue;
        }

        function renderRecords() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filterValue = document.getElementById('factoryFilter').value;
            const listElement = document.getElementById('recordList');
            
            const filtered = records.filter(r => {
                const matchSearch = r.model.toLowerCase().includes(searchTerm) || 
                                   r.content.toLowerCase().includes(searchTerm) ||
                                   r.item.toLowerCase().includes(searchTerm);
                const matchFactory = filterValue === '全部' || r.factory === filterValue;
                return matchSearch && matchFactory;
            });

            document.getElementById('recordCount').textContent = `${filtered.length} 筆`;

            listElement.innerHTML = filtered.length ? filtered.map(r => `
                <div class="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm hover:shadow-md transition-all">
                    <div class="flex justify-between items-start mb-4">
                        <div class="space-y-2">
                            <div class="flex flex-wrap gap-2">
                                <span class="bg-slate-900 text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-tighter">${r.factory}</span>
                                <span class="bg-blue-50 text-blue-600 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-tighter">${r.item}</span>
                            </div>
                            <h3 class="text-xl font-bold text-slate-800">${r.model}</h3>
                        </div>
                        <div class="text-right flex flex-col items-end">
                            <span class="text-xs font-bold text-slate-400 mb-4 tracking-tighter">${r.date}</span>
                            <button onclick="deleteRecord(${r.id})" class="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-full transition">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                    <div class="flex flex-col gap-4">
                        <div class="bg-slate-50 rounded-2xl p-4 text-slate-600 text-sm leading-relaxed whitespace-pre-wrap border border-slate-100">${r.content}</div>
                        ${r.image ? `
                            <div class="relative rounded-2xl overflow-hidden border border-slate-200 shadow-inner">
                                <img src="${r.image}" class="w-full h-auto max-h-[400px] object-contain bg-slate-100">
                            </div>
                        ` : ''}
                    </div>
                </div>
            `).join('') : `
                <div class="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-200 text-slate-400">
                    <i data-lucide="layers" class="w-12 h-12 mx-auto mb-4 opacity-20"></i>
                    <p class="font-medium">尚無符合條件的查修紀錄</p>
                </div>
            `;
            
            lucide.createIcons();
        }

        // 初始啟動
        updateFactoryFilter();
        renderRecords();
        lucide.createIcons();
    </script>
</body>
</html>
