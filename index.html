<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixLog | 專業查修</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --m-dark: #3e4d20;
            --m-deep: #556b2f;
            --m-prime: #7a944e;
            --m-soft: #f4f7ed;
        }
        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            background-color: var(--m-soft); 
            color: var(--m-dark);
        }
        .giant-text { font-size: 1.85rem; line-height: 1.1; font-weight: 900; }
        .glass-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 12px 30px -10px rgba(62, 77, 32, 0.1);
            border: 1px solid rgba(122, 148, 78, 0.15);
        }
        .matcha-btn {
            background: linear-gradient(135deg, #556b2f 0%, #7a944e 100%);
        }
        .collapse-content { 
            max-height: 0; 
            overflow: hidden; 
            transition: all 0.5s cubic-bezier(0.33, 1, 0.68, 1); 
            opacity: 0; 
        }
        .is-open .collapse-content { max-height: 2000px; opacity: 1; padding-top: 1.25rem; }
        .is-open .arrow-icon { transform: rotate(180deg); color: var(--m-prime); }
        
        input, textarea {
            background: #fafbf8 !important;
            border: 1.5px solid #e1e8d5 !important;
            border-radius: 14px !important;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-xl border-b border-stone-200/50 px-6 h-18 flex justify-between items-center shadow-sm">
        <h1 class="text-2xl font-black italic tracking-tighter text-stone-800">FIX<span class="text-[#7a944e]">LOG</span></h1>
        <button onclick="toggleForm()" class="matcha-btn text-white w-11 h-11 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-all">
            <i data-lucide="plus" id="plusIcon" class="w-6 h-6"></i>
        </button>
    </nav>

    <main class="max-w-2xl mx-auto p-4 mt-4">
        
        <!-- 表單 -->
        <div id="repairForm" class="hidden glass-card p-8 mb-10 animate-in fade-in zoom-in duration-300">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black">建立查修紀錄</h2>
                <div class="h-1 w-12 bg-[#7a944e] rounded-full"></div>
            </div>
            
            <form onsubmit="saveRecord(event)" class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-black uppercase text-stone-400 ml-1">廠別</label>
                        <input type="text" id="f_factory" placeholder="分廠" class="p-4" required>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-black uppercase text-stone-400 ml-1">時間</label>
                        <input type="datetime-local" id="f_datetime" class="p-4 text-sm font-bold">
                    </div>
                </div>
                
                <div class="grid grid-cols-3 gap-4">
                    <div class="col-span-2 flex flex-col gap-1.5">
                        <label class="text-xs font-black uppercase text-stone-400 ml-1">機型</label>
                        <input type="text" id="f_model" placeholder="機台型號" class="p-4" required>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-black uppercase text-stone-400 ml-1">機號</label>
                        <input type="text" id="f_sn" placeholder="ID#" class="p-4">
                    </div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-black uppercase text-stone-400 ml-1">維修項目</label>
                    <input type="text" id="f_item" placeholder="故障主旨" class="p-4">
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-black uppercase text-stone-400 ml-1">維修詳情</label>
                    <textarea id="f_content" rows="4" placeholder="輸入處理過程..." class="p-4" required></textarea>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-black uppercase text-stone-400 ml-1">現場照片</label>
                    <div class="relative bg-stone-50 border-2 border-dashed border-stone-200 rounded-2xl p-8 text-center hover:bg-stone-100 transition cursor-pointer group">
                        <input type="file" id="f_image" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="previewImage(this)">
                        <div id="imgPreviewContainer" class="hidden">
                            <img id="imgPreview" src="" class="max-h-56 mx-auto rounded-xl shadow-md">
                        </div>
                        <div id="uploadPrompt" class="text-stone-400 font-bold">
                            <i data-lucide="image-plus" class="w-8 h-8 mx-auto mb-2 opacity-50"></i>
                            <span class="text-sm">點擊上傳影像</span>
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full matcha-btn text-white py-5 rounded-2xl font-black text-xl shadow-xl active:scale-[0.98] transition-all">
                    儲存日誌
                </button>
            </form>
        </div>

        <!-- 搜尋 -->
        <div class="mb-8 space-y-4">
            <div class="relative">
                <i data-lucide="search" class="absolute left-5 top-5 w-5 h-5 text-stone-300"></i>
                <input type="text" id="searchInput" oninput="renderRecords()" placeholder="搜尋設備、機號、內容..." class="w-full pl-14 pr-6 py-5 border-none shadow-sm rounded-[1.5rem] bg-white font-bold text-stone-700">
            </div>
            <div class="flex gap-2 overflow-x-auto no-scrollbar" id="factoryFilterRow"></div>
        </div>

        <!-- 列表 -->
        <div id="recordList" class="space-y-4"></div>

    </main>

    <!-- 吐司通知 (Toast) -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-stone-800 text-white px-6 py-3 rounded-full text-sm font-bold shadow-2xl opacity-0 transition-opacity pointer-events-none z-[100]">
        已複製到剪貼簿 ✨
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('fixlog_v6_data')) || [];
        let currentImageData = null;
        let selectedFactory = '全部';

        function setCurrentTime() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('f_datetime').value = now.toISOString().slice(0, 16);
        }

        function toggleForm() {
            const form = document.getElementById('repairForm');
            const icon = document.getElementById('plusIcon');
            form.classList.toggle('hidden');
            icon.style.transform = form.classList.contains('hidden') ? 'rotate(0)' : 'rotate(45deg)';
            if(!form.classList.contains('hidden')) { setCurrentTime(); window.scrollTo({top: 0, behavior: 'smooth'}); }
        }

        function previewImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentImageData = e.target.result;
                    document.getElementById('imgPreview').src = currentImageData;
                    document.getElementById('imgPreviewContainer').classList.remove('hidden');
                    document.getElementById('uploadPrompt').classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        function shareRecord(id, event) {
            event.stopPropagation();
            const r = records.find(x => x.id === id);
            if(!r) return;
            const text = `【維修回報】\n廠別：${r.factory}\n時間：${r.datetime}\n機型：${r.model}\n機號：${r.sn}\n項目：${r.item}\n內容：${r.content}`;
            
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.remove('opacity-0');
                setTimeout(() => toast.classList.add('opacity-0'), 2000);
            });
        }

        function saveRecord(e) {
            e.preventDefault();
            const newRecord = {
                id: Date.now(),
                factory: document.getElementById('f_factory').value.trim(),
                datetime: document.getElementById('f_datetime').value.replace('T', ' '),
                model: document.getElementById('f_model').value.trim(),
                sn: document.getElementById('f_sn').value.trim() || '-',
                item: document.getElementById('f_item').value.trim() || '一般查修',
                content: document.getElementById('f_content').value.trim(),
                image: currentImageData
            };
            records.unshift(newRecord);
            localStorage.setItem('fixlog_v6_data', JSON.stringify(records));
            e.target.reset();
            currentImageData = null;
            document.getElementById('imgPreviewContainer').classList.add('hidden');
            document.getElementById('uploadPrompt').classList.remove('hidden');
            toggleForm();
            renderRecords();
        }

        function deleteRecord(id, event) {
            event.stopPropagation();
            if(confirm('確定刪除？')) {
                records = records.filter(r => r.id !== id);
                localStorage.setItem('fixlog_v6_data', JSON.stringify(records));
                renderRecords();
            }
        }

        function renderRecords() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('recordList');
            const filterRow = document.getElementById('factoryFilterRow');
            
            const factories = ['全部', ...new Set(records.map(r => r.factory))];
            filterRow.innerHTML = factories.map(f => `
                <button onclick="setFilter('${f}')" class="whitespace-nowrap px-6 py-2.5 rounded-2xl font-black text-xs tracking-widest transition-all ${selectedFactory === f ? 'matcha-btn text-white' : 'bg-white text-stone-400 border border-stone-100'}">
                    ${f.toUpperCase()}
                </button>
            `).join('');

            const filtered = records.filter(r => {
                const matchSearch = r.model.toLowerCase().includes(searchTerm) || r.content.toLowerCase().includes(searchTerm) || r.sn.toLowerCase().includes(searchTerm);
                const matchFactory = selectedFactory === '全部' || r.factory === selectedFactory;
                return matchSearch && matchFactory;
            });

            list.innerHTML = filtered.map(r => `
                <div class="glass-card overflow-hidden cursor-pointer active:scale-[0.99] transition-transform" onclick="this.classList.toggle('is-open')">
                    <div class="p-5">
                        <div class="flex justify-between items-center mb-3">
                            <div class="flex items-center gap-2">
                                <!-- 廠別優化：深色標籤更醒目 -->
                                <span class="text-[11px] font-black bg-[#556b2f] text-white px-3 py-1 rounded-full uppercase tracking-tighter shadow-sm">${r.factory}</span>
                                <span class="text-[10px] font-bold text-stone-300">${r.datetime}</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <!-- 分享連結 -->
                                <button onclick="shareRecord(${r.id}, event)" class="p-2 hover:bg-stone-100 rounded-full text-[#7a944e] transition-colors">
                                    <i data-lucide="share-2" class="w-5 h-5"></i>
                                </button>
                                <i data-lucide="chevron-down" class="arrow-icon w-5 h-5 text-stone-300 transition-transform"></i>
                            </div>
                        </div>
                        
                        <div class="giant-text text-stone-800 mb-2">
                            <span>${r.model}</span>
                            <!-- 機號優化：深抹茶色斜體 -->
                            <span class="text-[#556b2f] text-2xl font-bold ml-2 opacity-80 italic">#${r.sn}</span>
                        </div>
                        
                        <!-- 維修項目優化：字體加大並加深顏色 -->
                        <div class="text-[15px] font-black text-[#7a944e] flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-[#7a944e]"></span>
                            ${r.item}
                        </div>
                    </div>
                    
                    <div class="collapse-content px-5 pb-6">
                        <div class="bg-stone-50 rounded-2xl p-5 text-[15px] text-stone-600 leading-relaxed border border-stone-100 font-medium">
                            ${r.content}
                        </div>
                        ${r.image ? `<img src="${r.image}" class="w-full mt-4 rounded-2xl border-2 border-white shadow-lg">` : ''}
                        <div class="flex justify-end mt-4">
                            <button onclick="deleteRecord(${r.id}, event)" class="p-3 text-stone-200 hover:text-red-400 transition-colors">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

            lucide.createIcons();
        }

        function setFilter(f) { selectedFactory = f; renderRecords(); }
        setCurrentTime();
        renderRecords();
        lucide.createIcons();
    </script>
</body>
</html>
