<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixLog | Haute Couture Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Noto+Sans+TC:wght@300;500;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --m-dark: #2d361c;
            --m-prime: #7a944e;
            --m-light: #fdfefb;
        }
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: var(--m-light);
            color: var(--m-dark);
            overflow-x: hidden;
        }
        /* 浮誇流體背景 */
        .bg-gradient-fluid {
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at center, #e1e8d5 0%, #fdfefb 40%);
            z-index: -1;
            animation: rotateFluid 20s linear infinite;
        }
        @keyframes rotateFluid { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 設計師質感卡片 */
        .designer-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 40px;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
        }
        .designer-card:hover {
            transform: translateY(-10px) scale(1.01);
            box-shadow: 0 40px 80px rgba(122, 148, 78, 0.12);
        }

        /* 巨型字體標題 */
        .mega-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 5rem;
            line-height: 0.8;
            letter-spacing: -4px;
            opacity: 0.05;
            position: absolute;
            top: 20px; right: -20px;
            pointer-events: none;
            user-select: none;
        }

        /* 抹茶漸層按鈕 */
        .btn-premium {
            background: linear-gradient(135deg, #3e4d20 0%, #7a944e 100%);
            box-shadow: 0 15px 30px rgba(62, 77, 32, 0.25);
            border-radius: 20px;
            transition: all 0.4s;
        }
        .btn-premium:active { transform: scale(0.9); }

        .is-open .collapse-content { max-height: 2000px; opacity: 1; margin-top: 2rem; }
        .collapse-content { max-height: 0; overflow: hidden; transition: all 0.8s ease; opacity: 0; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="custom-scrollbar">

    <div class="bg-gradient-fluid"></div>

    <!-- Header -->
    <header class="px-8 pt-12 pb-6 flex justify-between items-end sticky top-0 z-40 bg-white/30 backdrop-blur-md">
        <div>
            <p class="text-xs font-black tracking-[0.3em] text-[#7a944e] mb-1">ENGINEERING LOGBOOK</p>
            <h1 class="text-4xl font-black tracking-tighter">FIX<span class="text-stone-300">.</span>CORE</h1>
        </div>
        <button onclick="toggleForm()" class="btn-premium text-white w-14 h-14 flex items-center justify-center">
            <i data-lucide="plus" id="plusIcon" class="w-8 h-8"></i>
        </button>
    </header>

    <main class="max-w-3xl mx-auto p-6 relative">
        <div class="mega-title">FIXLOG</div>

        <!-- 月會浮誇橫幅 -->
        <div id="meetingAlert" class="designer-card p-10 mb-12 border-l-[12px] border-[#7a944e] relative overflow-hidden group">
            <div class="relative z-10">
                <div class="flex items-center gap-3 mb-6">
                    <div id="daysCount" class="bg-[#2d361c] text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase">倒數中</div>
                    <div class="w-12 h-[1px] bg-stone-200"></div>
                </div>
                <h2 class="text-5xl font-black tracking-tighter mb-4 text-stone-800">
                    <span id="meetingDateText">--/--</span>
                </h2>
                <p id="meetingStatus" class="text-sm font-medium text-stone-400 max-w-[200px] leading-relaxed">
                    本週五開會。記得準備本月的查修亮點報告。
                </p>
            </div>
            <div class="absolute right-[-20px] bottom-[-20px] opacity-[0.03] group-hover:opacity-10 transition-opacity duration-1000">
                <i data-lucide="calendar" class="w-64 h-64"></i>
            </div>
        </div>

        <!-- 搜尋列 -->
        <div class="mb-12 relative group">
            <input type="text" id="searchInput" oninput="renderRecords()" placeholder="SEARCH LOGS..." 
                class="w-full bg-white/50 border-none px-10 py-8 rounded-[30px] text-xl font-bold placeholder:text-stone-300 focus:ring-4 focus:ring-[#7a944e]/10 transition-all shadow-inner">
            <i data-lucide="search" class="absolute right-8 top-8 text-stone-300"></i>
        </div>

        <div id="factoryFilterRow" class="flex gap-4 mb-12 overflow-x-auto no-scrollbar py-2"></div>

        <!-- 列表區 -->
        <div id="recordList" class="space-y-10"></div>
    </main>

    <!-- 全螢幕浮誇表單 -->
    <div id="repairForm" class="hidden fixed inset-0 z-[100] bg-white/95 backdrop-blur-3xl p-10 overflow-y-auto">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-start mb-20">
                <div>
                    <h2 class="text-6xl font-black tracking-tighter">NEW<br>ENTRY</h2>
                    <div class="h-2 w-20 bg-[#7a944e] mt-4"></div>
                </div>
                <button onclick="toggleForm()" class="p-6 bg-stone-100 rounded-full hover:rotate-90 transition-transform duration-500">
                    <i data-lucide="x" class="w-10 h-10"></i>
                </button>
            </div>
            
            <form onsubmit="saveRecord(event)" class="space-y-12">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                    <div class="border-b-2 border-stone-100 pb-4 focus-within:border-[#7a944e] transition-colors">
                        <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest">Factory</label>
                        <input type="text" id="f_factory" placeholder="廠別" class="w-full text-3xl font-bold bg-transparent outline-none mt-2" required>
                    </div>
                    <div class="border-b-2 border-stone-100 pb-4 focus-within:border-[#7a944e] transition-colors">
                        <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest">Timestamp</label>
                        <input type="datetime-local" id="f_datetime" class="w-full text-2xl font-bold bg-transparent outline-none mt-2">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
                    <div class="md:col-span-2 border-b-2 border-stone-100 pb-4 focus-within:border-[#7a944e] transition-colors">
                        <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest">Machine Model</label>
                        <input type="text" id="f_model" placeholder="機型" class="w-full text-3xl font-bold bg-transparent outline-none mt-2" required>
                    </div>
                    <div class="border-b-2 border-stone-100 pb-4 focus-within:border-[#7a944e] transition-colors">
                        <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest">Serial Number</label>
                        <input type="text" id="f_sn" placeholder="#ID" class="w-full text-3xl font-bold bg-transparent outline-none mt-2">
                    </div>
                </div>

                <div class="border-b-2 border-stone-100 pb-4 focus-within:border-[#7a944e] transition-colors">
                    <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest">Maintenance Subject</label>
                    <input type="text" id="f_item" placeholder="維修項目" class="w-full text-3xl font-bold bg-transparent outline-none mt-2">
                </div>

                <div class="border-b-2 border-stone-100 pb-4 focus-within:border-[#7a944e] transition-colors">
                    <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest">Detailed Report</label>
                    <textarea id="f_content" rows="4" placeholder="在此輸入技術細節..." class="w-full text-2xl font-medium bg-transparent outline-none mt-4" required></textarea>
                </div>

                <div class="pt-8">
                    <div class="relative group cursor-pointer border-4 border-dashed border-stone-100 rounded-[40px] p-20 text-center hover:bg-[#7a944e]/5 transition-all">
                        <input type="file" id="f_image" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="previewImage(this)">
                        <div id="imgPreviewContainer" class="hidden"><img id="imgPreview" src="" class="max-h-80 mx-auto rounded-2xl shadow-2xl"></div>
                        <div id="uploadPrompt">
                            <i data-lucide="camera" class="w-16 h-16 mx-auto mb-6 text-stone-200 group-hover:text-[#7a944e] transition-colors"></i>
                            <p class="text-stone-300 font-black">點擊以附加影像證明</p>
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full btn-premium text-white py-10 rounded-[30px] text-3xl font-black shadow-2xl mb-20">
                    COMPLETE ENTRY
                </button>
            </form>
        </div>
    </div>

    <!-- 吐司通知 -->
    <div id="toast" class="fixed bottom-12 left-1/2 -translate-x-1/2 bg-black text-white px-10 py-5 rounded-full text-xs font-black tracking-[0.2em] shadow-2xl opacity-0 transition-all z-[200]">COPIED TO CLIPBOARD</div>

    <script>
        // 日期推算邏輯
        function updateMeetingDisplay() {
            const now = new Date();
            let targetDate;
            const currentDay = now.getDay();
            const daysToFriday = (currentDay <= 5) ? (5 - currentDay) : (12 - currentDay);
            const thisFriday = new Date(now.getTime() + daysToFriday * 24 * 60 * 60 * 1000);
            thisFriday.setHours(0,0,0,0);
            const todayZero = new Date(now.getFullYear(), now.getMonth(), now.getDate());

            if (todayZero <= thisFriday) {
                targetDate = thisFriday;
                document.getElementById('meetingStatus').innerText = "本週五即將開會。請提前準備本週查修重點報告。";
            } else {
                let nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
                let firstDay = nextMonth.getDay();
                let firstFriday = (firstDay <= 5) ? (5 - firstDay) : (12 - firstDay);
                targetDate = new Date(nextMonth.getTime() + (firstFriday + 7) * 24 * 60 * 60 * 1000);
                document.getElementById('meetingStatus').innerText = "本月會議已圓滿結束。下次會議預計於下月第二週五。";
            }
            document.getElementById('meetingDateText').innerText = `${targetDate.getMonth()+1}/${targetDate.getDate()}`;
            const diffDays = Math.ceil((targetDate - todayZero) / (1000 * 60 * 60 * 24));
            document.getElementById('daysCount').innerText = diffDays === 0 ? "TODAY" : `IN ${diffDays} DAYS`;
        }

        let records = JSON.parse(localStorage.getItem('fixlog_v10_data')) || [];
        let currentImageData = null;
        let selectedFactory = '全部';

        function toggleForm() {
            const form = document.getElementById('repairForm');
            form.classList.toggle('hidden');
            if(!form.classList.contains('hidden')) {
                const now = new Date();
                now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                document.getElementById('f_datetime').value = now.toISOString().slice(0, 16);
            }
        }

        function previewImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentImageData = e.target.result;
                    document.getElementById('imgPreview').src = currentImageData;
                    document.getElementById('imgPreviewContainer').classList.remove('hidden');
                    document.getElementById('uploadPrompt').classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        function saveRecord(e) {
            e.preventDefault();
            const r = {
                id: Date.now(),
                factory: document.getElementById('f_factory').value.trim(),
                datetime: document.getElementById('f_datetime').value.replace('T', ' '),
                model: document.getElementById('f_model').value.trim(),
                sn: document.getElementById('f_sn').value.trim() || '-',
                item: document.getElementById('f_item').value.trim() || 'General Maintenance',
                content: document.getElementById('f_content').value.trim(),
                image: currentImageData
            };
            records.unshift(r);
            localStorage.setItem('fixlog_v10_data', JSON.stringify(records));
            e.target.reset();
            currentImageData = null;
            document.getElementById('imgPreviewContainer').classList.add('hidden');
            document.getElementById('uploadPrompt').classList.remove('hidden');
            toggleForm();
            renderRecords();
        }

        function shareRecord(id, event) {
            event.stopPropagation();
            const r = records.find(x => x.id === id);
            const text = `【FIX.CORE REPORT】\nFactory: ${r.factory}\nTime: ${r.datetime}\nMachine: ${r.model} (${r.sn})\nItem: ${r.item}\nNote: ${r.content}`;
            navigator.clipboard.writeText(text).then(() => {
                const t = document.getElementById('toast');
                t.style.opacity = '1';
                setTimeout(() => t.style.opacity = '0', 2000);
            });
        }

        function deleteRecord(id, event) {
            event.stopPropagation();
            if(confirm('REMOVE THIS RECORD?')) {
                records = records.filter(r => r.id !== id);
                localStorage.setItem('fixlog_v10_data', JSON.stringify(records));
                renderRecords();
            }
        }

        function renderRecords() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('recordList');
            const filterRow = document.getElementById('factoryFilterRow');
            
            const factories = ['全部', ...new Set(records.map(r => r.factory))];
            filterRow.innerHTML = factories.map(f => `
                <button onclick="setFilter('${f}')" class="whitespace-nowrap px-8 py-3 rounded-2xl font-black text-[10px] tracking-widest transition-all ${selectedFactory === f ? 'bg-[#2d361c] text-white' : 'bg-white text-stone-400 hover:bg-stone-50'} shadow-sm">
                    ${f.toUpperCase()}
                </button>
            `).join('');

            const filtered = records.filter(r => {
                const match = r.model.toLowerCase().includes(searchTerm) || r.content.toLowerCase().includes(searchTerm) || r.sn.toLowerCase().includes(searchTerm);
                return match && (selectedFactory === '全部' || r.factory === selectedFactory);
            });

            list.innerHTML = filtered.map(r => `
                <div class="designer-card overflow-hidden cursor-pointer p-8 group" onclick="this.classList.toggle('is-open')">
                    <div class="flex justify-between items-start mb-6">
                        <div class="flex items-center gap-4">
                            <span class="bg-[#7a944e] text-white px-4 py-1 rounded-full text-[10px] font-black tracking-widest">${r.factory}</span>
                            <span class="text-[10px] font-black text-stone-300">${r.datetime}</span>
                        </div>
                        <button onclick="shareRecord(${r.id}, event)" class="opacity-0 group-hover:opacity-100 transition-opacity p-2 hover:bg-stone-50 rounded-full">
                            <i data-lucide="external-link" class="w-5 h-5 text-stone-400"></i>
                        </button>
                    </div>
                    
                    <div class="mb-4">
                        <h3 class="text-4xl font-black tracking-tighter text-stone-800">${r.model}</h3>
                        <p class="text-2xl font-black text-[#7a944e] mt-1 opacity-80"># ${r.sn}</p>
                    </div>

                    <div class="flex items-center gap-3">
                        <div class="w-1 h-6 bg-stone-100"></div>
                        <p class="text-lg font-bold text-stone-500">${r.item}</p>
                    </div>

                    <div class="collapse-content">
                        <div class="bg-stone-50 rounded-[30px] p-8 text-xl font-medium text-stone-600 leading-relaxed italic">
                            "${r.content}"
                        </div>
                        ${r.image ? `<img src="${r.image}" class="w-full mt-8 rounded-[40px] shadow-2xl shadow-[#7a944e]/20">` : ''}
                        <div class="flex justify-end mt-8">
                            <button onclick="deleteRecord(${r.id}, event)" class="p-4 text-stone-200 hover:text-red-400 transition-colors">
                                <i data-lucide="trash-2" class="w-6 h-6"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function setFilter(f) { selectedFactory = f; renderRecords(); }
        updateMeetingDisplay();
        renderRecords();
        lucide.createIcons();
    </script>
</body>
</html>
