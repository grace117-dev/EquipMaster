<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixLog | 專業設備查修紀錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --matcha-bg: #f8f9f6;
            --matcha-deep: #4a5d23;
            --matcha-primary: #86a65c;
            --matcha-border: #e2e8da;
        }
        body { 
            font-family: 'Roboto', 'Noto Sans TC', sans-serif; 
            background-color: var(--matcha-bg); 
            color: var(--matcha-deep);
            -webkit-font-smoothing: antialiased;
        }
        /* 高級感漸層與陰影 */
        .matcha-gradient { background: linear-gradient(135deg, #6b8e23 0%, #86a65c 100%); }
        .premium-card { 
            background: white; 
            border: 1px solid var(--matcha-border);
            box-shadow: 0 4px 20px rgba(74, 93, 35, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .premium-card:hover { box-shadow: 0 10px 30px rgba(74, 93, 35, 0.08); }
        
        /* 手風琴動畫 */
        .collapse-content { 
            max-height: 0; 
            overflow: hidden; 
            transition: all 0.4s ease; 
            opacity: 0; 
        }
        .is-open .collapse-content { 
            max-height: 1500px; 
            opacity: 1; 
            padding-top: 1.5rem; 
        }
        .is-open .arrow-icon { transform: rotate(180deg); }

        /* 輸入框美化 */
        input, select, textarea { 
            border: 1px solid #dce3d2 !important; 
            border-radius: 12px !important; 
            background: #ffffff !important;
        }
        input:focus { 
            border-color: var(--matcha-primary) !important; 
            box-shadow: 0 0 0 4px rgba(134, 166, 92, 0.1) !important;
            outline: none; 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-16">

    <!-- 導航列 -->
    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-xl border-b border-stone-200/50">
        <div class="max-w-3xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 matcha-gradient rounded-lg shadow-sm"></div>
                <h1 class="text-2xl font-bold tracking-tight text-stone-800">Fix<span class="text-[#86a65c]">Log</span></h1>
            </div>
            <button onclick="toggleForm()" class="matcha-gradient text-white px-5 py-2.5 rounded-xl shadow-lg hover:opacity-90 active:scale-95 transition-all flex items-center gap-2 font-medium">
                <i data-lucide="plus" id="plusIcon" class="w-5 h-5 transition-transform duration-500"></i>
                <span>新紀錄</span>
            </button>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-6 mt-4">
        
        <!-- 表單：維持抹茶綠質感 -->
        <div id="repairForm" class="hidden premium-card rounded-[2rem] p-8 mb-12 animate-in fade-in slide-in-from-top-4 duration-500">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-xl font-bold text-stone-800">建立查修日誌</h2>
                <span class="text-xs text-stone-400 font-medium tracking-widest uppercase">New Entry</span>
            </div>
            
            <form onsubmit="saveRecord(event)" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-stone-500 uppercase ml-1">廠別 / 部門</label>
                        <input type="text" id="f_factory" placeholder="例如：研發一廠" class="w-full p-4" required>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-stone-500 uppercase ml-1">日期</label>
                        <input type="date" id="f_date" class="w-full p-4">
                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-stone-500 uppercase ml-1">機型</label>
                        <input type="text" id="f_model" placeholder="設備型號名稱" class="w-full p-4" required>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-stone-500 uppercase ml-1">機號</label>
                        <input type="text" id="f_sn" placeholder="ID 編號" class="w-full p-4">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-stone-500 uppercase ml-1">維修項目</label>
                    <input type="text" id="f_item" placeholder="故障排除、更換零件..." class="w-full p-4">
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-stone-500 uppercase ml-1">詳細說明</label>
                    <textarea id="f_content" rows="4" placeholder="請輸入維修過程與最終結果..." class="w-full p-4" required></textarea>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-stone-500 uppercase ml-1">影像上傳</label>
                    <div class="relative bg-stone-50 border border-dashed border-stone-200 rounded-2xl p-8 text-center hover:bg-stone-100 transition cursor-pointer group">
                        <input type="file" id="f_image" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="previewImage(this)">
                        <div id="imgPreviewContainer" class="hidden">
                            <img id="imgPreview" src="" class="max-h-64 mx-auto rounded-xl shadow-md border-2 border-white">
                        </div>
                        <div id="uploadPrompt" class="flex flex-col items-center">
                            <i data-lucide="camera" class="w-8 h-8 mb-2 text-stone-300 group-hover:text-stone-400 transition-colors"></i>
                            <span class="text-sm font-medium text-stone-400">點擊此處拍照或選取照片</span>
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full matcha-gradient text-white py-4 rounded-xl font-bold text-lg shadow-xl shadow-lime-900/10 active:scale-[0.99] transition-all">
                    儲存紀錄
                </button>
            </form>
        </div>

        <!-- 搜尋列 -->
        <div class="space-y-6 mb-12">
            <div class="relative">
                <i data-lucide="search" class="absolute left-5 top-5 w-5 h-5 text-stone-300"></i>
                <input type="text" id="searchInput" oninput="renderRecords()" placeholder="搜尋設備、機號或關鍵字..." class="w-full pl-14 pr-6 py-5 bg-white rounded-2xl shadow-sm border border-stone-100 font-medium placeholder:text-stone-300 outline-none focus:border-lime-200 transition-all">
            </div>
            <div class="flex gap-2 overflow-x-auto no-scrollbar py-1" id="factoryFilterRow"></div>
        </div>

        <!-- 歷史列表 -->
        <div id="recordList" class="space-y-5"></div>

    </main>

    <script>
        let records = JSON.parse(localStorage.getItem('fixlog_v4_data')) || [];
        let currentImageData = null;
        let selectedFactory = '全部';

        document.getElementById('f_date').valueAsDate = new Date();

        function toggleForm() {
            const form = document.getElementById('repairForm');
            const icon = document.getElementById('plusIcon');
            form.classList.toggle('hidden');
            icon.style.transform = form.classList.contains('hidden') ? 'rotate(0)' : 'rotate(45deg)';
            if(!form.classList.contains('hidden')) window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function previewImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentImageData = e.target.result;
                    document.getElementById('imgPreview').src = currentImageData;
                    document.getElementById('imgPreviewContainer').classList.remove('hidden');
                    document.getElementById('uploadPrompt').classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        function saveRecord(e) {
            e.preventDefault();
            const newRecord = {
                id: Date.now(),
                factory: document.getElementById('f_factory').value.trim(),
                date: document.getElementById('f_date').value,
                model: document.getElementById('f_model').value.trim(),
                sn: document.getElementById('f_sn').value.trim() || '-',
                item: document.getElementById('f_item').value.trim() || '未分類',
                content: document.getElementById('f_content').value.trim(),
                image: currentImageData
            };

            records.unshift(newRecord);
            localStorage.setItem('fixlog_v4_data', JSON.stringify(records));
            e.target.reset();
            currentImageData = null;
            document.getElementById('imgPreviewContainer').classList.add('hidden');
            document.getElementById('uploadPrompt').classList.remove('hidden');
            toggleForm();
            renderRecords();
        }

        function deleteRecord(id, event) {
            event.stopPropagation();
            if(confirm('確定要永久移除這筆紀錄嗎？')) {
                records = records.filter(r => r.id !== id);
                localStorage.setItem('fixlog_v4_data', JSON.stringify(records));
                renderRecords();
            }
        }

        function toggleAccordion(el) {
            el.classList.toggle('is-open');
        }

        function setFilter(f) {
            selectedFactory = f;
            renderRecords();
        }

        function renderRecords() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('recordList');
            const filterRow = document.getElementById('factoryFilterRow');
            
            const factories = ['全部', ...new Set(records.map(r => r.factory))];
            filterRow.innerHTML = factories.map(f => `
                <button onclick="setFilter('${f}')" class="whitespace-nowrap px-6 py-2 rounded-xl font-bold text-xs transition-all ${selectedFactory === f ? 'matcha-gradient text-white shadow-md' : 'bg-white text-stone-400 border border-stone-200'}">
                    ${f}
                </button>
            `).join('');

            const filtered = records.filter(r => {
                const matchSearch = r.model.toLowerCase().includes(searchTerm) || r.content.toLowerCase().includes(searchTerm) || r.sn.toLowerCase().includes(searchTerm);
                const matchFactory = selectedFactory === '全部' || r.factory === selectedFactory;
                return matchSearch && matchFactory;
            });

            list.innerHTML = filtered.map(r => `
                <div class="premium-card rounded-2xl overflow-hidden cursor-pointer" onclick="toggleAccordion(this)">
                    <!-- 標題預覽區 -->
                    <div class="p-6 flex justify-between items-center bg-white">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-3 mb-2">
                                <span class="bg-stone-100 text-stone-500 text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider">${r.factory}</span>
                                <span class="text-[10px] font-medium text-stone-300 uppercase">${r.date}</span>
                            </div>
                            <!-- 歷史紀錄標題放大 -->
                            <h3 class="text-2xl font-bold text-stone-800 truncate mb-1">
                                ${r.model} 
                                <span class="text-lime-600/30 font-normal text-lg ml-2">#${r.sn}</span>
                            </h3>
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-bold text-[#86a65c]">● ${r.item}</span>
                            </div>
                        </div>
                        <i data-lucide="chevron-down" class="arrow-icon w-6 h-6 text-stone-200 transition-transform duration-500"></i>
                    </div>
                    
                    <!-- 展開詳細區 -->
                    <div class="collapse-content px-6 pb-8">
                        <div class="bg-stone-50/50 rounded-2xl p-6 text-base text-stone-600 leading-relaxed mb-6 whitespace-pre-wrap border border-stone-100">
                            ${r.content}
                        </div>
                        ${r.image ? `
                            <div class="mb-6">
                                <img src="${r.image}" class="w-full rounded-2xl shadow-sm border border-stone-100">
                            </div>
                        ` : ''}
                        <div class="flex justify-end">
                            <button onclick="deleteRecord(${r.id}, event)" class="px-4 py-2 text-stone-300 hover:text-red-400 transition-colors flex items-center gap-2 text-xs font-bold">
                                <i data-lucide="trash-2" class="w-4 h-4"></i> 刪除紀錄
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

            if(!filtered.length) {
                list.innerHTML = `<div class="text-center py-20 text-stone-300 font-medium italic">
                    尚未有符合條件的查修紀錄
                </div>`;
            }

            lucide.createIcons();
        }

        renderRecords();
        lucide.createIcons();
    </script>
</body>
</html>
