<style>
    :root {
        --bg:         #f4f2ee;
        --card:       #ffffff;
        --green:      #2d3e20;
        --green-mid:  #3d5429;
        --green-lt:   #516b36;
        --green-pale: #edf2e6;
        --green-line: #c8d9b4;
        --brass:      #b8893a;
        --text:       #1a1a1a;
        --text-mid:   #555;
        --text-sub:   #999;
        --border:     rgba(0,0,0,0.07);
        --sh-sm:      0 1px 4px rgba(0,0,0,0.06);
        --sh:         0 2px 16px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
        font-family: "Noto Sans TC", -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        overscroll-behavior: none;
    }
    .font-display { font-family: "Syne", sans-serif; }
    .font-mono    { font-family: "JetBrains Mono", monospace; }

    /* Nav */
    .app-nav {
        background: rgba(244,242,238,0.94);
        backdrop-filter: saturate(180%) blur(20px);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        border-bottom: 1px solid var(--border);
    }

    /* Cards */
    .card {
        background: var(--card);
        border-radius: 16px;
        box-shadow: var(--sh-sm);
        border: 1px solid var(--border);
        position: relative;
        overflow: hidden;
    }
    .card-tap { transition: transform 0.14s ease; }
    .card-tap:active { transform: scale(0.987); }

    /* Tab bar */
    .tab-bar {
        background: rgba(255,255,255,0.96);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-top: 1px solid var(--border);
    }
    .tab-btn { transition: color 0.2s; }
    .tab-btn.active      { color: var(--green); }
    .tab-btn:not(.active){ color: #bbb; }
    .tab-line {
        height: 2px; width: 18px;
        background: var(--green);
        border-radius: 1px;
        margin: 3px auto 0;
        transition: opacity 0.2s;
    }

    /* FAB */
    .fab {
        background: var(--green);
        box-shadow: 0 4px 24px rgba(45,62,32,0.38), 0 1px 6px rgba(0,0,0,0.18);
        transition: transform 0.14s ease, box-shadow 0.14s ease;
    }
    .fab:active { transform: scale(0.87); box-shadow: 0 2px 10px rgba(45,62,32,0.28); }

    /* Pages */
    .page { display: none; }
    .page.active { display: block; animation: pgIn 0.26s ease both; }
    @keyframes pgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    /* Hero */
    .hero-card {
        background: var(--green);
        border-radius: 20px;
        position: relative;
        overflow: hidden;
    }
    .hero-card::after {
        content: 'FL';
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 128px;
        color: rgba(255,255,255,0.04);
        position: absolute;
        right: -8px; bottom: -24px;
        line-height: 1;
        pointer-events: none;
        letter-spacing: -6px;
    }

    /* Stats */
    .stat-num { font-family: "JetBrains Mono", monospace; letter-spacing: -0.03em; font-weight: 500; }

    /* Bar */
    .bar-track { background: #ece9e3; border-radius: 99px; height: 6px; overflow: hidden; }
    .bar-fill {
        height: 100%; border-radius: 99px; background: var(--green);
        transition: width 0.9s cubic-bezier(.22,.68,0,1.2); width: 0;
    }

    /* Collapse */
    .collapse-content { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease, opacity 0.22s ease; opacity:0; }
    .is-open .collapse-content { grid-template-rows: 1fr; opacity: 1; }
    .inner-content { overflow: hidden; }
    .chevron-icon { transition: transform 0.24s ease; }
    .is-open .chevron-icon { transform: rotate(90deg); }

    /* Pills */
    .pill { border-radius: 99px; padding: 5px 14px; font-size: 11px; font-weight: 700; transition: all 0.18s; white-space: nowrap; }
    .pill.on  { background: var(--green); color: #fff; }
    .pill.off { background: #fff; color: var(--text-sub); border: 1px solid #e8e5e0; }

    /* Form */
    .form-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); }
    .form-sheet   { border-radius: 24px 24px 0 0; background: var(--bg); }
    .field-row    { display: flex; align-items: center; padding: 13px 16px; border-bottom: 1px solid #f2efe9; }
    .field-row:last-child { border-bottom: none; }
    .field-label  { width: 64px; font-size: 12px; color: var(--text-sub); font-weight: 600; flex-shrink: 0; letter-spacing: 0.02em; }
    .field-input  { flex:1; background: transparent; font-size: 14px; outline: none; color: var(--text); font-family: "Noto Sans TC", sans-serif; }

    /* Meeting */
    .meeting-card { border-left: 3px solid var(--green); }

    /* Misc */
    .no-scroll::-webkit-scrollbar { display: none; }
    .no-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    .hidden-input { position: absolute; width:1px; height:1px; opacity:0; overflow:hidden; }
    .badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px; }
    .btn-tap:active { transform: scale(0.93); opacity: 0.7; }

    /* Section label */
    .sec-label { font-size: 10px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.1em; text-transform: uppercase; }

    /* Slide in */
    .slide-in { animation: sIn 0.28s ease both; }
    @keyframes sIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

    /* Month nav */
    .mnav { width:28px; height:28px; border-radius:8px; background:#ebe8e2; display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--text-mid); transition:background 0.15s; }
    .mnav:active { background: var(--green-pale); }

    /* Toast */
    #toast { transform: translateX(-50%); transition: opacity 0.25s ease, top 0.25s ease; }

    /* Empty */
    .empty-state { text-align:center; padding:48px 20px; color:var(--text-sub); }

    /* Record action buttons */
    .rac { display:flex; align-items:center; gap:5px; padding:6px 11px; border-radius:10px; font-size:11px; font-weight:700; transition: background 0.14s, transform 0.1s; }
    .rac:active { transform: scale(0.91); }
    .rac.edit { background:#f0ede8; color:#555; }
    .rac.copy { background:#e8f0fb; color:#3b7dd8; }
    .rac.del  { background:#fdf0f0; color:#d94f4f; }
</style>

<script>
// ═══════════════════════════════════════════
// 永恆金鑰 — 升級不遺失資料
// ═══════════════════════════════════════════
const DB_KEY = 'FIXLOG_MASTER_DATABASE';
const LEGACY_KEYS = ['FIXLOG_MASTER_DATABASE','fixlog_records','fixlog-data','FL_RECORDS'];

function loadRecords() {
    for (const key of LEGACY_KEYS) {
        try {
            const raw = localStorage.getItem(key);
            if (!raw) continue;
            const parsed = JSON.parse(raw);
            if (Array.isArray(parsed) && parsed.length > 0) {
                localStorage.setItem(DB_KEY, raw);
                return parsed;
            }
        } catch(e) {}
    }
    return [];
}

let records    = loadRecords();
let currentImg = null;
let selFac     = '全部';
let editId     = null;
let statYear   = new Date().getFullYear();
let statMonth  = new Date().getMonth();

// ═══════════════════════════════════════════
// Navigation
// ═══════════════════════════════════════════
function switchPage(name, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.remove('active');
        const l = b.querySelector('.tab-line'); if (l) l.style.opacity = '0';
    });
    document.getElementById('page-'+name).classList.add('active');
    btn.classList.add('active');
    const l = btn.querySelector('.tab-line'); if (l) l.style.opacity = '1';
    document.getElementById('navTitle').innerText = name==='dash' ? '查修日誌' : '維修紀錄';
    if (name==='records') renderRecords();
    if (name==='dash')    renderDashboard();
}

// ═══════════════════════════════════════════
// Dashboard
// ═══════════════════════════════════════════
function setStatMonth(d) {
    statMonth += d;
    if (statMonth > 11) { statMonth=0; statYear++; }
    if (statMonth < 0)  { statMonth=11; statYear--; }
    renderDashboard();
}

function renderDashboard() {
    const now=new Date(), tM=now.getMonth(), tY=now.getFullYear();
    const lM=tM===0?11:tM-1, lY=tM===0?tY-1:tY;
    const mR  = records.filter(r => { const d=new Date(r.datetime); return d.getMonth()===tM&&d.getFullYear()===tY; });
    const lmR = records.filter(r => { const d=new Date(r.datetime); return d.getMonth()===lM&&d.getFullYear()===lY; });
    const wR  = records.filter(r => new Date(r.datetime) >= new Date(now-7*86400000));
    const fS  = new Set(records.map(r=>r.factory));

    animNum('heroMonthCount', mR.length);
    animNum('heroTotal',      records.length);
    animNum('heroFactories',  fS.size);
    animNum('heroWeek',       wR.length);
    document.getElementById('heroMonthLabel').innerText = `${tY} 年 ${tM+1} 月`;

    const mom = document.getElementById('heroMoM');
    if (!lmR.length) { mom.innerText='—'; mom.style.color='rgba(255,255,255,0.4)'; }
    else {
        const p = Math.round((mR.length-lmR.length)/lmR.length*100);
        mom.innerText = (p>=0?'+':'')+p+'%';
        mom.style.color = p>=0?'#a8d080':'#f87171';
    }

    document.getElementById('statMonthLabel').innerText = `${statYear}/${String(statMonth+1).padStart(2,'0')}`;
    const sR = records.filter(r => { const d=new Date(r.datetime); return d.getMonth()===statMonth&&d.getFullYear()===statYear; });
    const fc=document.getElementById('factoryChart'), fe=document.getElementById('factoryEmpty');
    if (!sR.length) { fc.classList.add('hidden'); fe.classList.remove('hidden'); }
    else {
        fc.classList.remove('hidden'); fe.classList.add('hidden');
        const cnt={}; sR.forEach(r => cnt[r.factory]=(cnt[r.factory]||0)+1);
        const sorted=Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
        const max=sorted[0][1];
        const sh=['#2d3e20','#3d5429','#516b36','#6b8c4a','#8aaa63','#aac880'];
        fc.innerHTML = sorted.map(([f,c],i) => `
            <div class="flex items-center gap-3">
                <div class="w-14 text-[11px] font-bold text-right flex-shrink-0 truncate" style="color:var(--text-mid)">${f}</div>
                <div class="flex-1 bar-track"><div class="bar-fill" data-w="${c/max*100}" style="background:${sh[i%sh.length]};width:0"></div></div>
                <div class="stat-num text-sm font-bold w-5 text-right" style="color:var(--text)">${c}</div>
            </div>`).join('');
        requestAnimationFrame(() => fc.querySelectorAll('.bar-fill').forEach(el => el.style.width=el.dataset.w+'%'));
    }

    const tw=document.getElementById('weekTrendChart'), tl=document.getElementById('weekTrendLabels');
    const days=[];
    for (let i=6;i>=0;i--) {
        const d=new Date(now); d.setDate(d.getDate()-i); d.setHours(0,0,0,0);
        const n=new Date(d); n.setDate(n.getDate()+1);
        const c=records.filter(r=>{const rd=new Date(r.datetime);return rd>=d&&rd<n;}).length;
        days.push({c,label:['日','一','二','三','四','五','六'][d.getDay()],today:i===0});
    }
    const maxD=Math.max(...days.map(d=>d.c),1);
    tw.innerHTML=days.map(d=>`
        <div class="flex-1 flex flex-col items-center justify-end gap-1">
            <span class="stat-num text-[10px] font-bold ${d.c?'text-stone-500':'text-transparent'}">${d.c||''}</span>
            <div class="w-full rounded-t-md" style="height:${Math.max(d.c/maxD*44,3)}px;background:${d.today?'var(--green)':'var(--green-line)'}"></div>
        </div>`).join('');
    tl.innerHTML=days.map(d=>`
        <div class="flex-1 text-center text-[10px] font-bold" style="color:${d.today?'var(--green)':'var(--text-sub)'}">${d.label}</div>`).join('');

    lucide.createIcons();
}

function animNum(id, target) {
    const el=document.getElementById(id), from=parseInt(el.innerText)||0;
    const dur=550, t0=performance.now();
    const tick=t=>{
        const p=Math.min((t-t0)/dur,1), e=1-Math.pow(1-p,3);
        el.innerText=Math.round(from+(target-from)*e);
        if(p<1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
}

// ═══════════════════════════════════════════
// Meeting
// ═══════════════════════════════════════════
function updateMeeting() {
    const now=new Date(); now.setHours(0,0,0,0);
    let target;
    const manual=localStorage.getItem('fixlog_manual_meeting');
    const rb=document.getElementById('resetMeetingBtn');
    if (manual) {
        target=new Date(manual); rb.classList.remove('hidden');
        document.getElementById('meetingStatus').innerText='📍 手動設定日期';
    } else {
        const dow=now.getDay(), toF=(dow<=5)?(5-dow):(12-dow);
        target=new Date(now.getTime()+toF*86400000); rb.classList.add('hidden');
        document.getElementById('meetingStatus').innerText='✦ 自動計算：本週五';
    }
    document.getElementById('meetingDateText').innerText=`${target.getFullYear()} / ${target.getMonth()+1} / ${target.getDate()}`;
    const diff=Math.ceil((target-now)/86400000);
    const dc=document.getElementById('daysCount');
    if      (diff===0) { dc.innerText='今天';          dc.className='badge bg-red-100 text-red-600'; }
    else if (diff<0)   { dc.innerText=`已過 ${-diff} 天`; dc.className='badge bg-stone-100 text-stone-400'; }
    else               { dc.innerText=`剩 ${diff} 天`;  dc.className='badge text-white'; dc.style.cssText='background:var(--green);font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px'; }
}
function handleManualDate(v) { if(!v)return; localStorage.setItem('fixlog_manual_meeting',v); updateMeeting(); showToast('📅 月會日期已更新'); }
function resetMeetingDate(e) { if(e)e.stopPropagation(); localStorage.removeItem('fixlog_manual_meeting'); updateMeeting(); showToast('🔄 已恢復自動計算'); }

// ═══════════════════════════════════════════
// Records
// ═══════════════════════════════════════════
function renderRecords() {
    const s=document.getElementById('searchInput').value.toLowerCase();
    const list=document.getElementById('recordList');
    const fr=document.getElementById('factoryFilterRow');
    fr.innerHTML=['全部',...new Set(records.map(r=>r.factory))].map(f=>
        `<button onclick="setFilter('${f}')" class="pill ${selFac===f?'on':'off'}">${f}</button>`
    ).join('');
    const res=records.filter(r=>{
        const hit=[r.model,r.content,r.factory,r.item,r.sn].some(v=>(v||'').toLowerCase().includes(s));
        return hit&&(selFac==='全部'||r.factory===selFac);
    });
    document.getElementById('searchCount').innerText=(s||selFac!=='全部')?`${res.length} 筆`:'';
    if (!res.length) {
        list.innerHTML=`<div class="empty-state"><i data-lucide="search-x" class="w-7 h-7 mx-auto mb-2 opacity-20"></i><p class="text-sm font-medium text-stone-400">找不到符合的紀錄</p></div>`;
    } else {
        list.innerHTML=res.map((r,idx)=>`
            <div class="card card-tap mb-3 slide-in" data-card-id="${r.id}" style="animation-delay:${idx*0.03}s">
                <div class="p-4">
                    <div class="flex justify-between items-start">
                        <div class="flex-1 min-w-0 pr-3">
                            <div class="flex items-center gap-2 mb-1.5 flex-wrap">
                                <span class="text-[10px] font-black px-2 py-0.5 rounded-full" style="background:var(--green-pale);color:var(--green)">${r.factory}</span>
                                <span class="font-mono text-[10px] text-stone-400">${r.datetime}</span>
                            </div>
                            <h3 class="font-bold text-[15px] leading-snug" style="color:var(--text)">${r.model} <span class="text-xs font-normal text-stone-400">#${r.sn}</span></h3>
                            <p class="text-[11px] font-semibold mt-0.5" style="color:var(--green-lt)">${r.item}</p>
                        </div>
                        <div class="flex items-center gap-1.5 flex-shrink-0">
                            <button data-action="edit" data-id="${r.id}" class="rac edit">
                                <i data-lucide="pencil" class="w-3 h-3 pointer-events-none"></i>
                                <span class="pointer-events-none">編輯</span>
                            </button>
                            <button data-action="copy" data-id="${r.id}" class="rac copy">
                                <i data-lucide="copy" class="w-3 h-3 pointer-events-none"></i>
                                <span class="pointer-events-none">複製</span>
                            </button>
                            <i data-lucide="chevron-right" class="chevron-icon w-4 h-4 text-stone-300 pointer-events-none ml-0.5"></i>
                        </div>
                    </div>
                    <div class="collapse-content">
                        <div class="inner-content">
                            <div class="mt-3 rounded-xl p-3 text-sm leading-relaxed border" style="background:#fafaf8;border-color:#f0ede8;color:var(--text-mid)">${r.content.replace(/\n/g,'<br>')}</div>
                            ${r.image?`<img src="${r.image}" class="w-full mt-3 rounded-2xl object-cover max-h-52">`:''}
                            <div class="flex justify-end mt-3 pt-3 border-t" style="border-color:#f0ede8">
                                <button data-action="delete" data-id="${r.id}" class="rac del">
                                    <i data-lucide="trash-2" class="w-3 h-3 pointer-events-none"></i>
                                    <span class="pointer-events-none">刪除紀錄</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`).join('');
    }
    lucide.createIcons();
}

function setFilter(f) { selFac=f; renderRecords(); }

document.getElementById('recordList').addEventListener('click', function(e) {
    const btn=e.target.closest('[data-action]'), card=e.target.closest('[data-card-id]');
    if (!card) return;
    if (btn) {
        e.stopPropagation();
        const {action,id}=btn.dataset;
        if (action==='edit')   openFormForEdit(id);
        if (action==='copy')   copyRecord(id);
        if (action==='delete') deleteRecord(id);
    } else { card.classList.toggle('is-open'); }
});

// ═══════════════════════════════════════════
// Form
// ═══════════════════════════════════════════
function openFormForAdd() {
    editId=null; document.querySelector('form').reset();
    document.getElementById('formTitle').innerText='新增紀錄';
    document.getElementById('saveBtn').innerText='儲存紀錄';
    currentImg=null;
    document.getElementById('imgPreviewContainer').classList.add('hidden');
    document.getElementById('uploadPrompt').classList.remove('hidden');
    const n=new Date(); n.setMinutes(n.getMinutes()-n.getTimezoneOffset());
    document.getElementById('f_datetime').value=n.toISOString().slice(0,16);
    document.getElementById('factory-list').innerHTML=[...new Set(records.map(r=>r.factory))].map(f=>`<option value="${f}">`).join('');
    document.getElementById('repairForm').classList.remove('hidden');
}
function openFormForEdit(id) {
    const r=records.find(x=>x.id===id); if(!r)return;
    editId=id;
    document.getElementById('formTitle').innerText='編輯紀錄';
    document.getElementById('saveBtn').innerText='更新紀錄';
    document.getElementById('f_factory').value=r.factory;
    document.getElementById('f_datetime').value=r.datetime.replace(' ','T');
    document.getElementById('f_model').value=r.model;
    document.getElementById('f_sn').value=r.sn==='-'?'':r.sn;
    document.getElementById('f_item').value=r.item;
    document.getElementById('f_content').value=r.content;
    if (r.image) {
        currentImg=r.image;
        document.getElementById('imgPreview').src=r.image;
        document.getElementById('imgPreviewContainer').classList.remove('hidden');
        document.getElementById('uploadPrompt').classList.add('hidden');
    } else {
        currentImg=null;
        document.getElementById('imgPreviewContainer').classList.add('hidden');
        document.getElementById('uploadPrompt').classList.remove('hidden');
    }
    document.getElementById('repairForm').classList.remove('hidden');
}
function closeForm() { document.getElementById('repairForm').classList.add('hidden'); }

function processImage(input) {
    const file=input.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
        const img=new Image();
        img.onload=()=>{
            const canvas=document.createElement('canvas');
            let w=img.width,h=img.height,max=900;
            if(w>h&&w>max){h*=max/w;w=max;}else if(h>max){w*=max/h;h=max;}
            canvas.width=w;canvas.height=h;
            canvas.getContext('2d').drawImage(img,0,0,w,h);
            currentImg=canvas.toDataURL('image/jpeg',0.72);
            document.getElementById('imgPreview').src=currentImg;
            document.getElementById('imgPreviewContainer').classList.remove('hidden');
            document.getElementById('uploadPrompt').classList.add('hidden');
        };
        img.src=e.target.result;
    };
    reader.readAsDataURL(file);
}

function saveRecord(e) {
    e.preventDefault();
    const d={
        factory: document.getElementById('f_factory').value.trim(),
        datetime:document.getElementById('f_datetime').value.replace('T',' '),
        model:   document.getElementById('f_model').value.trim(),
        sn:      document.getElementById('f_sn').value.trim()||'-',
        item:    document.getElementById('f_item').value.trim()||'未分類',
        content: document.getElementById('f_content').value.trim(),
        image:   currentImg
    };
    if (editId) { records[records.findIndex(x=>x.id===editId)]={...records.find(x=>x.id===editId),...d}; showToast('✅ 紀錄已更新'); }
    else        { records.unshift({id:'ID'+Date.now(),...d}); showToast('✅ 紀錄已儲存'); }
    localStorage.setItem(DB_KEY,JSON.stringify(records));
    closeForm(); renderDashboard();
    if(document.getElementById('page-records').classList.contains('active')) renderRecords();
}

// ═══════════════════════════════════════════
// CRUD
// ═══════════════════════════════════════════
function deleteRecord(id) {
    if(!confirm('確定刪除此紀錄？'))return;
    records=records.filter(r=>r.id!==id);
    localStorage.setItem(DB_KEY,JSON.stringify(records));
    renderRecords(); renderDashboard(); showToast('🗑 紀錄已移除');
}
function copyRecord(id) {
    const r=records.find(x=>x.id===id);
    navigator.clipboard.writeText(`【FixLog 維修回報】\n廠別：${r.factory}\n時間：${r.datetime}\n設備：${r.model} #${r.sn}\n項目：${r.item}\n內容：${r.content}`)
        .then(()=>showToast('📋 已複製到剪貼簿'));
}

// ═══════════════════════════════════════════
// Import / Export
// ═══════════════════════════════════════════
function isIOS() { return /iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1); }

function exportData() {
    if(!records.length){showToast('❌ 目前沒有紀錄可匯出');return;}
    const json=JSON.stringify(records,null,2);
    document.getElementById('exportDesc').innerText=`共 ${records.length} 筆紀錄`;
    document.getElementById('exportDesktopArea').classList.toggle('hidden', isIOS());
    document.getElementById('exportIosArea').classList.toggle('hidden', !isIOS());
    if(isIOS()) document.getElementById('exportJsonText').value=json;
    document.getElementById('exportModal').classList.remove('hidden');
    lucide.createIcons();
}
function doFileDownload() {
    const blob=new Blob([JSON.stringify(records,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=Object.assign(document.createElement('a'),{href:url,download:`FixLog_${new Date().toISOString().slice(0,10)}.json`});
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1000);
    showToast('💾 備份已下載');closeExportModal();
}
function copyExportJson() {
    const ta=document.getElementById('exportJsonText');
    if(navigator.clipboard?.writeText) navigator.clipboard.writeText(ta.value).then(()=>showToast('📋 JSON 已複製'));
    else { ta.select();ta.setSelectionRange(0,99999);document.execCommand('copy');showToast('📋 JSON 已複製'); }
}
function closeExportModal() { document.getElementById('exportModal').classList.add('hidden'); }
function openImportModal() { switchImportTab('file');document.getElementById('importPasteText').value='';document.getElementById('importModal').classList.remove('hidden');lucide.createIcons(); }
function closeImportModal() { document.getElementById('importModal').classList.add('hidden'); }
function switchImportTab(tab) {
    const isF=tab==='file';
    document.getElementById('importFileTab').classList.toggle('hidden',!isF);
    document.getElementById('importPasteTab').classList.toggle('hidden',isF);
    const on='flex-1 py-2 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-stone-700';
    const off='flex-1 py-2 rounded-xl text-xs font-bold transition-all text-stone-400';
    document.getElementById('importTabFile').className=isF?on:off;
    document.getElementById('importTabPaste').className=isF?off:on;
}
function importFromFile(input) { const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=e=>processImportJSON(e.target.result);r.readAsText(f);input.value=''; }
function importFromPaste() { const t=document.getElementById('importPasteText').value.trim();if(!t){showToast('❌ 請先貼上 JSON 內容');return;}processImportJSON(t); }
function processImportJSON(text) {
    try {
        const imp=JSON.parse(text);
        if(!Array.isArray(imp))throw 0;
        if(!confirm(`確定匯入 ${imp.length} 筆紀錄？這將覆蓋所有現有資料！`))return;
        records=imp;localStorage.setItem(DB_KEY,JSON.stringify(records));
        renderDashboard();renderRecords();closeImportModal();showToast('✅ 資料還原成功');
    } catch { showToast('❌ 格式錯誤，請確認備份檔'); }
}

// ═══════════════════════════════════════════
// Toast
// ═══════════════════════════════════════════
function showToast(msg) {
    const t=document.getElementById('toast');
    t.innerText=msg;t.style.opacity='1';t.style.top='60px';
    clearTimeout(t._t);
    t._t=setTimeout(()=>{t.style.opacity='0';t.style.top='48px';},2400);
}

// ═══════════════════════════════════════════
// Init
// ═══════════════════════════════════════════
updateMeeting();
renderDashboard();
lucide.createIcons();
document.querySelector('.tab-btn.active .tab-line').style.opacity='1';
</script>
